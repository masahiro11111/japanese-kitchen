name: Update and Deploy Recipes

on:
  schedule:
    - cron: '0 21 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run scraper and translator
        run: python recipe_scraper.py
        env:
          AMAZON_TAG: ${{ secrets.AMAZON_TAG }}
          RAKUTEN_TAG: ${{ secrets.RAKUTEN_TAG }}

      - name: Copy index.html to root
        run: cp output/index.html index.html

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add index.html output/recipes.json
          git commit -m "Update recipes" || echo "No changes"
          git push
