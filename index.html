1%97%E3%82%87%E3%81%86%E3%81%8C/?tag="}], "steps": {"en": ["Cut the cabbage into 3cm-sized pieces, and cut the onion into 5mm-wide wedges. Cut the pork into bite-sized pieces and sprinkle with flour.", "Put 1/2 tablespoon of oil in a frying pan and heat over medium heat, then add the cabbage and fry over medium-high heat until lightly browned (to prevent it from wilting, fry quickly over medium-high heat). Add raw soy sauce, stir-fry, and serve in a bowl.", "Heat 1/2 tablespoon of oil in the same frying pan, add onions and pork, and stir-fry. When the heat goes through, add (A), stir-fry, and serve thickly on top of (2)."], "zh_tw": ["將高麗菜切成3公分大小的塊，將洋蔥切成5毫米寬的楔形。將豬肉切成一口大小的塊，撒上麵粉。", "煎鍋中放入1/2湯匙油，中火加熱，然後加入高麗菜，中火炒至淺棕色（為了防止高麗菜枯萎，請用中火快速炒）。加入生抽，翻炒，盛入碗中。", "在同一個煎鍋中加熱1/2湯匙油，加入洋蔥和豬肉，翻炒。待熱後，加入(A)，炒勻，再塗抹在(2)上。"], "zh_cn": ["将卷心菜切成3厘米大小的块，将洋葱切成5毫米宽的楔形。将猪肉切成一口大小的块，撒上面粉。", "煎锅中放入1/2汤匙油，中火加热，然后加入卷心菜，中火炒至浅棕色（为了防止卷心菜枯萎，请用中火快速炒）。加入生抽，翻炒，盛入碗中。", "在同一个煎锅中加热1/2汤匙油，加入洋葱和猪肉，翻炒。待热后，加入(A)，炒匀，然后涂在(2)上。"], "vi": ["Cắt bắp cải thành miếng có kích thước 3 cm và cắt hành tây thành từng miếng rộng 5 mm. Cắt thịt lợn thành miếng vừa ăn và rắc bột mì.", "Cho 1/2 thìa dầu vào chảo, đun trên lửa vừa, sau đó cho bắp cải vào xào trên lửa vừa cao cho đến khi chín vàng nhạt (để bắp cải không bị héo, chiên nhanh trên lửa vừa cao). Thêm nước tương thô, xào và cho vào tô.", "Đun nóng 1/2 thìa dầu trong chảo, cho hành tây và thịt lợn vào xào. Khi lửa đã nguội, thêm (A), xào và dọn dày lên trên (2)."], "hi": ["पत्तागोभी को 3 सेमी आकार के टुकड़ों में काटें, और प्याज को 5 मिमी चौड़े टुकड़ों में काटें। सूअर के मांस को छोटे टुकड़ों में काटें और आटे के साथ छिड़कें।", "एक फ्राइंग पैन में 1/2 बड़ा चम्मच तेल डालें और मध्यम आंच पर गर्म करें, फिर पत्तागोभी डालें और मध्यम-तेज आंच पर हल्का भूरा होने तक भूनें (इसे मुरझाने से बचाने के लिए, मध्यम-तेज आंच पर जल्दी से भूनें)। कच्ची सोया सॉस डालें, हिलाएँ और एक कटोरे में परोसें।", "उसी फ्राइंग पैन में 1/2 बड़ा चम्मच तेल गरम करें, प्याज और सूअर का मांस डालें और हिलाएँ। जब गर्मी पूरी हो जाए, तो (ए) डालें, हिलाएँ-तलें, और (2) के ऊपर गाढ़ा रूप से परोसें।"], "ru": ["Капусту нарежьте кусочками размером 3 см, а лук нарежьте дольками шириной 5 мм. Свинину нарезать небольшими кусочками и посыпать мукой.", "Налейте 1/2 столовой ложки масла в сковороду и нагрейте на среднем огне, затем добавьте капусту и обжарьте на средне-сильном огне до легкого подрумянивания (чтобы она не увяла, обжаривайте быстро на средне-сильном огне). Добавьте сырой соевый соус, обжарьте и подавайте в миске.", "Нагрейте 1/2 столовой ложки масла в той же сковороде, добавьте лук и свинину и обжарьте, помешивая. Когда огонь прогреется, добавьте (А), обжарьте, помешивая, и подавайте толстым слоем поверх (2)."], "th": ["หั่นกะหล่ำปลีเป็นชิ้นขนาด 3 ซม. และหั่นหัวหอมเป็นชิ้นกว้าง 5 มม. หั่นหมูเป็นชิ้นขนาดพอดีคำแล้วโรยด้วยแป้ง", "ใส่น้ำมัน 1/2 ช้อนโต๊ะลงในกระทะ ตั้งไฟปานกลาง จากนั้นใส่กะหล่ำปลีลงไปทอดบนไฟร้อนปานกลางจนเป็นสีน้ำตาลเล็กน้อย (เพื่อป้องกันไม่ให้เหี่ยว ให้ทอดเร็วๆ ด้วยไฟร้อนปานกลาง) ใส่ซีอิ๊วดิบ ผัด และเสิร์ฟในชาม", "ตั้งน้ำมัน 1/2 ช้อนโต๊ะในกระทะใบเดียวกัน ใส่หัวหอมและหมูลงไปผัด เมื่อไฟผ่าน ใส่ (A) ผัด และเสิร์ฟหนาๆ บน (2)"], "id": ["Potong kubis menjadi potongan berukuran 3 cm, dan potong bawang bombay menjadi irisan selebar 5 mm. Potong daging babi menjadi potongan-potongan kecil dan taburi tepung.", "Masukkan 1/2 sendok makan minyak ke dalam penggorengan dan panaskan dengan api sedang, lalu masukkan kubis dan goreng dengan api sedang-besar hingga berwarna kecoklatan (agar tidak layu, goreng cepat dengan api sedang-besar). Tambahkan kecap mentah, tumis, dan sajikan dalam mangkuk.", "Panaskan 1/2 sendok makan minyak dalam wajan yang sama, tambahkan bawang bombay dan daging babi, lalu tumis. Jika sudah panas, masukkan (A), tumis, dan sajikan kental di atas (2)."], "ms": ["Potong kubis menjadi kepingan bersaiz 3cm, dan potong bawang menjadi hirisan selebar 5mm. Potong daging babi kepada kepingan bersaiz gigitan dan taburkan dengan tepung.", "Masukkan 1/2 sudu besar minyak tag="}], "steps": {"en": ["Cut the beef into bite-sized pieces. Cut the potatoes and carrots into slightly larger than bite-sized pieces. Cut the onions along the grain into 1cm wide pieces. Cut the string konnyaku into easy-to-eat lengths and pour boiling water over them. Boil the snow peas briefly.", "In a deep frying pan or small pot, layer the potatoes, carrots, onions, beef, and konnyaku in that order, add (A), cover and simmer over medium heat for 4 to 5 minutes, then reduce the heat to low and simmer for another 5 to 6 minutes.", "Remove the lid and mix the ingredients well with a spoon. Place the beef and konjac on top of the potatoes and carrots, cover again, and simmer over medium heat for about 5 minutes. Let it sit until it has cooled down (this will allow the flavors to absorb).", "Place in a bowl and garnish with green peas."], "zh_tw": ["將牛肉切成一口大小的塊狀。將馬鈴薯和胡蘿蔔切成比一口大小稍大的塊狀。將洋蔥順著紋理切成1公分寬的片。將蒟蒻絲切成易於食用的長度，然後倒入沸水。將荷蘭豆短暫煮沸。", "將馬鈴薯、紅蘿蔔、洋蔥、牛肉、蒟蒻放入深煎鍋或小鍋中，依序放入(A)，蓋上鍋蓋，以中火煮4至5分鐘，然後轉小火，再煮5至6分鐘。", "取下蓋子，用湯匙將原料充分混合。將牛肉和蒟蒻放在馬鈴薯和胡蘿蔔上，再次蓋上鍋蓋，以中火煮約5分鐘。讓它靜置直至冷卻（這樣可以吸收味道）。", "放入碗中，用青豆裝飾。"], "zh_cn": ["将牛肉切成一口大小的块。将土豆和胡萝卜切成比一口大小稍大的块。将洋葱顺着纹理切成1厘米宽的片。将魔芋丝切成易于食用的长度，然后倒入沸水。将荷兰豆短暂煮沸。", "将土豆、胡萝卜、洋葱、牛肉、魔芋放入深煎锅或小锅中，依次放入(A)，盖上锅盖，中火煮4至5分钟，然后转小火，再煮5至6分钟。", "取下盖子，用勺子将原料充分混合。将牛肉和魔芋放在土豆和胡萝卜上，再次盖上锅盖，中火煮约5分钟。让它静置直至冷却（这样可以吸收味道）。", "放入碗中，用青豆装饰。"], "vi": ["Cắt thịt bò thành miếng vừa ăn. Cắt khoai tây và cà rốt thành miếng lớn hơn một chút. Cắt hành tây dọc thớ thành từng miếng rộng 1cm. Cắt sợi konnyaku thành những đoạn dài dễ ăn và đổ nước sôi lên trên. Đun sôi đậu tuyết một thời gian ngắn.", "Trong chảo sâu lòng hoặc nồi nhỏ, xếp khoai tây, cà rốt, hành tây, thịt bò và konnyaku theo thứ tự đó, thêm (A), đậy nắp và đun trên lửa vừa trong 4 đến 5 phút, sau đó giảm nhiệt xuống thấp và đun nhỏ lửa thêm 5 đến 6 phút nữa.", "Mở nắp và trộn đều nguyên liệu bằng thìa. Đặt thịt bò và konjac lên trên khoai tây và cà rốt, đậy nắp lại và đun trên lửa vừa trong khoảng 5 phút. Hãy để nó ngồi cho đến khi nó nguội (điều này sẽ cho phép hương vị hấp thụ).", "Đặt vào tô và trang trí với đậu xanh."], "hi": ["गोमांस को काटने के आकार के टुकड़ों में काटें। आलू और गाजर को छोटे आकार के टुकड़ों से थोड़े बड़े टुकड़ों में काट लें। प्याज को दाने के साथ 1 सेमी चौड़े टुकड़ों में काट लें। डोरी कोन्याकु को खाने में आसान लंबाई में काटें और उनके ऊपर उबलता पानी डालें। बर्फ के मटर को कुछ देर उबालें।", "एक गहरे फ्राइंग पैन या छोटे बर्तन में, आलू, गाजर, प्याज, बीफ और कोन्याकू को उसी क्रम में परत दें, (ए) डालें, ढक दें और मध्यम आंच पर 4 से 5 मिनट तक उबालें, फिर आंच को कम कर दें और 5 से 6 मिनट तक और पकाएं।", "ढक्कन हटाएँ और सामग्री को चम्मच से अच्छी तरह मिला लें। बीफ़ और कोनजैक को आलू और गाजर के ऊपर रखें, फिर से ढक दें और मध्यम आँच पर लगभग 5 मिनट तक उबालें। इसे ठंडा होने तक ऐसे ही रहने दें (इससे इसका स्वाद सोख लिया जाएगा)।", "- इसे एक बाउल में रखें और हरे मटर से सजाएं."], "ru": ["Говядину нарезаем некрупными кусочками. Нарежьте картофель и морковь кусочками чуть большего размера. Лук нарезаем вдоль волокон на кусочки шириной 1 см. Нарежьте веревку конняку на удобные для еды отрезки и залейте их кипятком. Ненадолго отварите снежный горошек.", "В глубокую сковороду или небольшую кастрюлю выложите слоями картофель, морковь, лук, говядину и конняку в указанном порядке, добавьте (А), накройте крышкой и тушите на среднем огне 4–5 минут, затем убавьте огонь до минимума и тушите еще 5–6 минут.", "Снимите крышку и хорошо перемешайте ингредиенты ложкой. Положите говядину и конжак поверх картофеля и моркови, снова накройте крышкой и тушите на среднем огне около 5 минут. Дайте ему постоять, пока оно не остынет (это позволит ароматам впитаться).", "Выложите в миску и украсьте зеленым горошком."], "th": ["หั่นเนื้อวัวเป็นชิ้นขนาดพอดีคำ หั่นมันฝรั่งและแครอทเป็นชิ้นที่มีขนาดใหญ่กว่าขนาดพอดีคำเล็กน้อย ตัดหัวหอมตามเมล็ดเป็นชิ้นกว้าง 1 ซม. ตัดเส้นคอนเนียคุให้เป็นเส้นยาวที่รับประทานง่าย แล้วเทน้ำเดือดลงไป ต้มถั่วหิมะเป็นเวลาสั้นๆ", "ในกระทะทรงลึกหรือหม้อขนาดเล็ก วางมันฝรั่ง แครอท หัวหอม เนื้อวัว และคอนเนียคุตามลำดับ ใส่ (A) ปิดฝาและเคี่ยวบนไฟร้อนปานกลางเป็นเวลา 4 ถึง 5 นาที จากนั้นลดไฟลงเหลือไฟอ่อนและเคี่ยวต่อไปอีก 5 ถึง 6 นาที", "เปิดฝาออกแล้วใช้ช้อนผสมส่วนผสมให้เข้ากัน วางเนื้อวัวและบุกบนมันฝรั่งและแครอท ปิดฝาอีกครั้ง และเคี่ยวบนไฟร้อนปานกลางประมาณ 5 นาที พักไว้จนเย็นลง (ซึ่งจะทำให้รสชาติซึมซับได้)", "วางในชามและโรยหน้าด้วยถั่วลันเตา"], "id": ["Potong daging sapi menjadi potongan-potongan seukuran gigitan. Potong kentang dan wortel menjadi potongan yang sedikit lebih besar dari ukuran sekali gigit. Potong bawang bombay sepanjang bulirnya menjadi potongan selebar 1 cm. Potong tali konnyaku menjadi potongan-potongan yang mudah dimakan dan tuangkan air mendidih ke atasnya. Rebus kacang polong sebentar.", "Dalam wajan penggorengan atau panci kecil, lapisi kentang, wortel, bawang bombay, daging sapi, dan konnyaku sesuai urutan, tambahkan (A), tutup dan masak dengan api sedang selama 4 hingga 5 menit, lalu kecilkan api menjadi kecil dan masak perlahan selama 5 hingga 6 menit.", "Buka tutupnya dan campur bahan dengan sendok. Letakkan daging sapi dan konjak di atas kentang dan wortel, tutup kembali, dan masak dengan api sedang selama kurang lebih 5 menit. Diamkan hingga dingin (agar bumbu meresap).", "Tempatkan dalam mangkuk dan hiasi dengan kacang hijau."], "ms": ["Potong daging lembu kepada kepingan bersaiz gigitan. Potong kentang dan lobak merah menjadi lebih besar sedikit daripada kepingan bersaiz gigitan. Potong bawang di sepanjang bijian menjadi kepingan selebar 1cm. Potong tali konnyaku mengikut panjang yang mudah dimakan dan tuangkan air mendidih ke atasnya. Rebus kacang salji sebentar.", "Dalam kuali atau periuk kecil, lapiskan kentang, lobak merah, bawang, daging lembu, dan konnyaku mengikut urutan itu, tambah (A), tutup dan reneh dengan api sederhana selama 4 hingga 5 minit, kemudian kecilkan api dan reneh selama 5 hingga 6 minit lagi.", "Keluarkan penutup dan gaul bahan-bahan dengan sudu. Letakkan daging lembu dan konjac di atas kentang dan lobak merah, tutup lagi, dan reneh dengan api sederhana selama kira-kira 5 minit. Biarkan sehingga ia sejuk (ini akan membolehkan perisa menyerap).", "Letakkan dalam mangkuk dan hiaskan dengan kacang hijau."], "ko": ["쇠고기는 먹기 쉬운 크기로 자른다. 감자와 당근은 한 입대보다 조금 큰 방해로 한다. 양파는 섬유를 따라 1cm 폭으로 자른다. 실 곤약은 먹기 쉬운 길이로 자르고 뜨거운 물을 뿌린다. 사야엔도는 살짝 삶아 둔다.", "깊은 프라이팬과 작은 냄비에 감자, 당근, 양파, 쇠고기, 실 곤약 순으로 겹쳐서 (A)를 넣고 뚜껑을 덮고 중불로 4~5분 끓여 약화로 하고 5~6분 더 끓인다.", "뚜껑을 잡고 재료를 숟가락으로 잘 섞는다. 감자와 당근 위에 쇠고기와 실 곤약을 얹고 다시 뚜껑을 덮고 중불로 약 5분간 끓인다. 조열이 취해질 때까지 둔다(맛을 포함시킨다).", "그릇에 담아 사야엔도를 장식한다."]}}, {"id": "eff5ed5e", "source_url": "https://www.kikkoman.co.jp/homecook/search/recipe/00052740/", "source_site": "Kikkoman", "image": "https://images.weserv.nl/?url=https://www.kikkoman.co.jp/homecook/assets/img/00052740.jpg&w=600&output=jpg", "title": {"en": "Easy and raw! Standard stir-fried meat and vegetables", "zh_tw": "簡單又原始！標準炒肉和蔬菜", "zh_cn": "简单又原始！标准炒肉和蔬菜", "vi": "Dễ dàng và thô! Thịt và rau xào tiêu chuẩn", "hi": "आसान और कच्चा! मानक तली हुई मांस और सब्जियाँ", "ru": "Легко и сыро! Стандартное жареное мясо и овощи", "th": "ง่ายและดิบ! ผัดเนื้อสัตว์และผักมาตรฐาน", "id": "Mudah dan mentah! Daging dan sayuran tumis standar", "ms": "Mudah dan mentah! Daging dan sayur tumis biasa", "ko": "사보생으로 간단! 스테디셀러 고기 야채 볶음"}, "title_ja": "しぼ生で簡単！定番の肉野菜炒め", "desc": {"en": "", "zh_tw": "", "zh_cn": "", "vi": "", "hi": "", "ru": "", "th": "", "id": "", "ms": "", "ko": ""}, "desc_ja": "", "ingredients": [{"name_ja": "キャベツ", "amount": "3枚", "translated": {"en": "cabbage", "zh_tw": "高麗菜", "zh_cn": "卷心菜", "vi": "bắp cải", "hi": "पत्ता गोभी", "ru": "капуста", "th": "กะหล่ำปลี", "id": "kubis", "ms": "kubis", "ko": "양배추"}, "amazon": "https://www.amazon.co.jp/s?k=%E3%82%AD%E3%83%A3%E3%83%99%E3%83%84&tag=", "rakuten": "https://search.rakuten.co.jp/search/mall/%E3%82%AD%E3%83%A3%E3%83%99%E3%83%84/?tag="}, {"name_ja": "にんじん", "amount": "30g", "translated": {"en": "carrot", "zh_tw": "紅蘿蔔", "zh_cn": "胡萝卜", "vi": "cà rốt", "hi": "गाजर", "ru": "морковь", "th":  then stir in the sesame oil."], "zh_tw": ["將高麗菜大致切碎，紅蘿蔔切成條，辣椒切成5毫米寬的片。將豆芽洗淨瀝乾，豬肉切成3-4公分寬的塊狀。", "煎鍋中倒入油，以中火加熱，依序將豬肉、高麗菜、紅蘿蔔、豆芽菜、青椒炒香。", "大火燒熱後，將火調至大火，加入醬油翻炒，再加入香油翻炒。"], "zh_cn": ["将卷心菜大致切碎，胡萝卜切成条，辣椒切成5毫米宽的片。将豆芽洗净沥干，猪肉切成3-4厘米宽的块。", "煎锅中倒入油，中火加热，依次将猪肉、卷心菜、胡萝卜、豆芽、青椒炒香。", "大火烧热后，将火调至大火，加入酱油翻炒，然后加入香油翻炒。"], "vi": ["Cắt nhỏ bắp cải, cắt cà rốt thành dải và cắt ớt thành miếng rộng 5mm. Giá đỗ rửa sạch, thái thịt lợn thành từng miếng rộng 3-4cm.", "Đun nóng dầu trong chảo trên lửa vừa và xào thịt lợn, bắp cải, cà rốt, giá đỗ và ớt xanh theo thứ tự.", "Khi lửa to thì vặn lửa to, cho nước tương vào xào rồi cho dầu mè vào đảo đều."], "hi": ["पत्तागोभी को मोटा-मोटा काट लें, गाजर को स्ट्रिप्स में काट लें और मिर्च को 5 मिमी चौड़े टुकड़ों में काट लें। बीन स्प्राउट्स को धोकर सुखा लें और सूअर के मांस को 3-4 सेमी चौड़े टुकड़ों में काट लें।", "मध्यम आंच पर एक फ्राइंग पैन में तेल गरम करें और उसी क्रम में सूअर का मांस, गोभी, गाजर, अंकुरित फलियां और हरी मिर्च भूनें।", "जब आंच तेज़ हो जाए, तो आंच तेज़ कर दें, सोया सॉस डालें और भूनें, फिर तिल का तेल डालें।"], "ru": ["Капусту крупно нашинковать, морковь нарезать соломкой, перец нарезать кусочками шириной 5 мм. Промойте и осушите ростки фасоли, а свинину нарежьте кусочками шириной 3–4 см.", "Нагрейте масло в сковороде на среднем огне и обжарьте в указанном порядке свинину, капусту, морковь, ростки фасоли и зеленый перец.", "Когда огонь утихнет, увеличьте огонь до сильного, добавьте соевый соус и обжарьте, затем добавьте кунжутное масло."], "th": ["สับกะหล่ำปลีอย่างหยาบ ตัดแครอทเป็นเส้น และหั่นพริกเป็นชิ้นกว้าง 5 มม. ล้างและสะเด็ดน้ำถั่วงอก แล้วหั่นหมูเป็นชิ้นกว้าง 3-4 ซม.", "ตั้งน้ำมันในกระทะบนไฟร้อนปานกลาง แล้วทอดหมู กะหล่ำปลี แครอท ถั่วงอก และพริกเขียวตามลำดับ", "เมื่อผ่านความร้อนแล้ว ให้เพิ่มไฟให้สูง ใส่ซีอิ๊วขาวลงไปผัด จากนั้นใส่น้ำมันงาลงไปผัด"], "id": ["Cincang kasar kubis, potong wortel menjadi potongan-potongan, dan potong paprika menjadi potongan selebar 5 mm. Cuci dan tiriskan tauge, lalu potong daging babi menjadi potongan selebar 3-4 cm.", "Panaskan minyak dalam wajan dengan api sedang lalu goreng daging babi, kubis, wortel, tauge, dan paprika hijau secara berurutan.", "Jika sudah cukup panas, besarkan api, tambahkan kecap asin dan tumis, lalu masukkan minyak wijen."], "ms": ["Cincang kasar kubis, potong lobak merah menjadi jalur, dan potong lada menjadi kepingan lebar 5mm. Basuh dan toskan taugeh, dan potong daging babi kepada kepingan lebar 3-4cm.", "Panaskan minyak dalam kuali dengan api sederhana dan goreng daging babi, kubis, lobak merah, taugeh dan lada hijau mengikut urutan itu.", "Apabila api sudah panas, kecilkan api, masukkan kicap dan tumis, kemudian masukkan minyak bijan."], "ko": ["양배추는 자르고 당근은 스트립으로 자르고 피망은 가로 5mm 폭으로 자른다. 콩나물은 씻어 물기를 자르고 돼지고기는 3~4cm 폭으로 자른다.", "프라이팬에 기름을 넣고 중불로 가열하고 돼지고기, 양배추, 당근, 콩나물, 고추 순으로 볶는다.", "불이 지나면 강불로 하고 간장을 넣고 볶아 참기름을 넣는다."]}}, {"id": "b3c38681", "source_url": "https://www.kikkoman.co.jp/homecook/search/recipe/00004001/", "source_site": "Kikkoman", "image": "https://images.weserv.nl/?url=https://www.kikkoman.co.jp/homecook/assets/img/00004001.jpg&w=600&output=jpg", "title": {"en": "Basic fried chicken [popular standard/tender thigh meat]", "zh_tw": "基礎炸雞【大眾標準/嫩大腿肉】", "zh_cn": "基础炸鸡【大众标准/嫩大腿肉】", "vi": "Gà rán cơ bản [thịt đùi mềm/tiêu chuẩn phổ biến]", "hi": "बेसिक फ्राइड चिकन [लोकप्रिय मानक/कोमल जांघ मांस]", "ru": "Базовая жареная курица [популярный стандарт/нежное мясо бедра]", "th": "ไก่ทอดธรรมดา [มาตรฐานยอดนิยม/เนื้อสะโพกนุ่ม]", "id": "Ayam goreng dasar [standar populer/daging paha empuk]", "ms": "Ayam goreng asas [daging peha standard popular/lembut]", "ko": "기본 닭고기에서 튀김 【인기의 단골・모모 고기 부드러운】"}, "title_ja": "基本の鶏のから揚げ【人気の定番・もも肉やわらか】", "desc": {"en": "", "zh_tw": "", "zh_cn": "", "vi": "", "hi": "", "ru": "", "th": "", "id": "", "ms": "", "ko": ""}, "desc_ja": "", "ingredients": [{"name_ja": "鶏もも肉", "amount": "1枚", "translated": {"en": "chicken thigh", "zh_tw": "雞大腿", "zh_cn": "鸡大腿", "vi": "đùi gà", "hi": "चिकन थाई", "ru": "куриное бедро", "th": "ต Dùng dao cắt phần dày của gà. Trận đấu (A).", "Cho dầu vào chảo, đun nóng ở lửa vừa và chiên gà từ mặt da lên trên. Khi bánh đã chín vàng, lật lại, đậy nắp và nấu trên lửa nhỏ trong khoảng 6 đến 7 phút cho đến khi chín.", "Lau sạch dầu thừa bằng giấy ăn, thêm (A), giảm lửa vừa và khuấy cho đến khi gà chín vàng.", "Cắt gà thành từng miếng vừa ăn, đặt lên đĩa, thêm rau diếp nắng và cà chua bi nếu muốn, rồi rưới phần nước sốt còn lại trên chảo rán."], "hi": ["चिकन के मोटे हिस्से को चाकू से काट कर खोल लीजिये. मिलान (ए)।", "एक फ्राइंग पैन में तेल डालें, मध्यम आंच पर गर्म करें और चिकन को छिलके वाली तरफ से ऊपर तक भूनें। जब यह अच्छी तरह से भूरा हो जाए, तो इसे पलट दें, ढक्कन से ढक दें और धीमी आंच पर लगभग 6 से 7 मिनट तक पकने तक पकाएं।", "किचन पेपर से अतिरिक्त तेल पोंछ लें, (ए) डालें, आंच को मध्यम कर दें और चिकन के भूरे होने तक हिलाएं।", "चिकन को छोटे टुकड़ों में काटें, एक प्लेट पर रखें, चाहें तो सनी लेट्यूस और चेरी टमाटर डालें और फ्राइंग पैन से बचा हुआ सॉस डालें।"], "ru": ["Разрежьте толстую часть курицы ножом. Матч (А).", "Налейте масло в сковороду, нагрейте на среднем огне и обжарьте курицу кожей вверх. Когда он хорошо подрумянится, переверните его, накройте крышкой и готовьте на слабом огне примерно 6–7 минут до готовности.", "Вытрите излишки масла кухонной бумагой, добавьте (А), убавьте огонь до среднего и перемешивайте, пока курица не подрумянится.", "Курицу нарежьте небольшими кусочками, выложите на тарелку, при желании добавьте солнечный салат и помидоры черри и полейте остатками соуса со сковороды."], "th": ["ใช้มีดผ่าส่วนที่หนาของไก่ออก แมตช์ (เอ)", "ใส่น้ำมันลงในกระทะ ตั้งไฟปานกลาง แล้วทอดไก่โดยหงายด้านหนังขึ้น เมื่อเป็นสีน้ำตาลดีแล้ว ให้พลิกกลับ ปิดฝา แล้วปรุงโดยใช้ไฟอ่อนประมาณ 6 ถึง 7 นาทีจนสุกทั่ว", "เช็ดน้ำมันส่วนเกินออกด้วยกระดาษในครัว ใส่ (A) ลดไฟลงเหลือไฟปานกลาง และคนจนไก่เป็นสีน้ำตาล", "หั่นไก่เป็นชิ้นขนาดพอดีคำ วางบนจาน ใส่ผักกาดหอมและมะเขือเทศเชอรี่ลงไปหากต้องการ แล้วราดซอสที่เหลือจากกระทะ"], "id": ["Potong bagian ayam yang tebal hingga terbuka dengan pisau. Pertandingan (A).", "Tambahkan minyak ke dalam wajan, panaskan dengan api sedang, dan goreng ayam dari sisi kulit menghadap ke atas. Jika sudah kecoklatan, balikkan, tutup dengan penutup, dan masak dengan api kecil selama sekitar 6 hingga 7 menit hingga matang.", "Bersihkan sisa minyak dengan tisu dapur, tambahkan (A), kecilkan api menjadi sedang, dan aduk hingga ayam berwarna kecoklatan.", "Potong ayam menjadi potongan-potongan kecil, letakkan di piring, tambahkan selada cerah dan tomat ceri jika diinginkan, dan tuangkan sisa saus dari penggorengan."], "ms": ["Potong bahagian tebal ayam dengan pisau. Perlawanan (A).", "Masukkan minyak ke dalam kuali, panaskan dengan api sederhana, dan goreng ayam dari bahagian kulit ke atas. Apabila sudah keperangan, balikkan, tutup dengan tudung dan masak dengan api perlahan selama kira-kira 6 hingga 7 minit sehingga masak.", "Sapu lebihan minyak dengan kertas dapur, masukkan (A), kecilkan api ke sederhana, dan kacau sehingga ayam keperangan.", "Potong ayam ke dalam kepingan bersaiz gigitan, letakkan di atas pinggan, tambah salad cerah dan tomato ceri jika dikehendaki, dan tuangkan baki sos dari kuali."], "ko": ["닭고기는 두꺼운 부분을 부엌칼로 솟아오르도록 열어 둔다. (A)는 맞추어 둔다.", "프라이팬에 기름을 넣고 중불로 가열하고, 닭고기를 껍질에서 구워, 제대로 구운 색이 붙으면 상하를 돌려주고, 뚜껑을 하고 약불로 6~7분 정도 구워 불을 통과시킨다.", "여분의 기름을 주방 페이퍼로 닦아내고, (A)를 넣고 중불로 하고, 닭고기에 빛나는 때까지 구워낸다.", "닭고기를 먹기 쉬운 크기로 잘라 그릇에 담아, 취향에 써니 양상추, 미니 토마토를 곁들여 프라이팬에 남은 양념장을 뿌린다."]}}, {"id": "d3a41e07", "source_url": "https://www.kikkoman.co.jp/homecook/search/recipe/00052745/", "source_site": "Kikkoman", "image": "https://images.weserv.nl/?url=https://www.kikkoman.co.jp/homecook/assets/img/00052745.jpg&w=600&output=jpg", "title": {"en": "Easy and raw! Standard boiled flatfish", "zh_tw": "簡單又原始！標準水煮比目魚", "zh_cn": "简单又原始！标准水煮比目鱼", "vi": "Dễ dàng và thô! Cá dẹt luộc tiêu chuẩn", "hi": "आसान और कच्चा! मानक उबली हुई चपटी मछली", "ru": "Легко и сыро! Стандартная отварная камбала", "th": "ง่ายและดิบ! ปลาเนื้อเรียบต้มมาตรฐาน", "id": " /www.amazon.co.jp/s?k=%E3%83%9E%E3%83%B3%E3%82%B8%E3%83%A7%E3%82%A6%E5%9B%BD%E7%94%A3%E7%B1%B3%E3%81%93%E3%81%A0%E3%82%8F%E3%82%8A%E4%BB%95%E8%BE%BC%E3%81%BF%E6%96%99%E7%90%86%E3%81%AE%E6%B8%85%E9%85%92&tag=", "rakuten": "https://search.rakuten.co.jp/search/mall/%E3%83%9E%E3%83%B3%E3%82%B8%E3%83%A7%E3%82%A6%E5%9B%BD%E7%94%A3%E7%B1%B3%E3%81%93%E3%81%A0%E3%82%8F%E3%82%8A%E4%BB%95%E8%BE%BC%E3%81%BF%E6%96%99%E7%90%86%E3%81%AE%E6%B8%85%E9%85%92/?tag="}, {"name_ja": "砂糖", "amount": "大さじ1", "translated": {"en": "sugar", "zh_tw": "糖", "zh_cn": "糖", "vi": "đường", "hi": "चीनी", "ru": "сахар", "th": "น้ำตาล", "id": "gula", "ms": "gula", "ko": "설탕"}, "amazon": "https://www.amazon.co.jp/s?k=%E7%A0%82%E7%B3%96&tag=", "rakuten": "https://search.rakuten.co.jp/search/mall/%E7%A0%82%E7%B3%96/?tag="}, {"name_ja": "水", "amount": "200ml", "translated": {"en": "water", "zh_tw": "水", "zh_cn": "水", "vi": "Nước", "hi": "पानी", "ru": "вода", "th": "น้ำ", "id": "air", "ms": "air", "ko": "물"}, "amazon": "https://www.amazon.co.jp/s?k=%E6%B0%B4&tag=", "rakuten": "https://search.rakuten.co.jp/search/mall/%E6%B0%B4/?tag="}], "steps": {"en": ["Remove the scales from the fish, make incisions on the surface of the skin, and pour boiling water over it to frost it. Slice 2 to 3 pieces of ginger into thin slices, and use the rest as needle ginger.", "Add (A) and thinly sliced ​​ginger to a frying pan (about 26 cm in diameter), bring to a boil, add the flatfish, cover with a drop lid, and simmer over medium heat for about 15 minutes until the liquid has reduced to about 1/3.", "Place the flatfish in a bowl, cover with the broth and add the ginger."], "zh_tw": ["將魚去除鱗，在魚皮表面劃出切口，用開水澆在魚身上，使其結霜。將2至3片生薑切成薄片，其餘的則當針薑。", "將(A)和薑片放入煎鍋(直徑約26公分)中，煮沸，加入比目魚，蓋上蓋子，中火煮約15分鐘，直至液體減少至約1/3。", "將比目魚放入碗中，蓋上高湯，加入薑。"], "zh_cn": ["将鱼去掉鳞，在鱼皮表面划出切口，用开水浇在鱼身上，使其结霜。将2至3片生姜切成薄片，其余的用作针姜。", "将(A)和姜片放入煎锅(直径约26厘米)中，煮沸，加入比目鱼，盖上盖子，中火煮约15分钟，直至液体减少至约1/3。", "将比目鱼放入碗中，盖上肉汤，加入姜。"], "vi": ["Loại bỏ vảy khỏi cá, rạch trên bề mặt da và đổ nước sôi lên trên để làm mờ. Cắt 2 đến 3 miếng gừng thành từng lát mỏng, phần còn lại dùng làm gừng kim.", "Cho (A) và gừng thái lát mỏng vào chảo rán (đường kính khoảng 26 cm), đun sôi, cho cá dẹt vào, đậy nắp lại và đun trên lửa vừa trong khoảng 15 phút cho đến khi chất lỏng giảm còn khoảng 1/3.", "Đặt cá dẹt vào tô, đổ nước dùng vào và thêm gừng."], "hi": ["मछली से पपड़ी हटा दें, त्वचा की सतह पर चीरा लगाएं और इसे ठंडा करने के लिए इसके ऊपर उबलता पानी डालें। अदरक के 2 से 3 टुकड़ों को पतले-पतले टुकड़ों में काट लें और बाकी को सुई अदरक की तरह इस्तेमाल करें।", "एक फ्राइंग पैन (लगभग 26 सेमी व्यास) में (ए) और पतली कटी हुई अदरक डालें, उबाल लें, फ्लैटफिश डालें, एक ड्रॉप ढक्कन के साथ कवर करें, और मध्यम गर्मी पर लगभग 15 मिनट तक उबालें जब तक कि तरल लगभग 1/3 तक कम न हो जाए।", "फ़्लैटफ़िश को एक कटोरे में रखें, शोरबा से ढकें और अदरक डालें।"], "ru": ["Снимите с рыбы чешую, сделайте надрезы на поверхности кожи и залейте ее кипятком, чтобы она заморозилась. Нарежьте 2–3 кусочка имбиря тонкими ломтиками, а оставшуюся часть используйте как игольчатый имбирь.", "Добавьте (А) и тонко нарезанный имбирь в сковороду (диаметром около 26 см), доведите до кипения, добавьте камбалу, накройте крышкой и тушите на среднем огне около 15 минут, пока жидкость не уменьшится примерно до 1/3.", "Положите камбалу в миску, залейте бульоном и добавьте имбирь."], "th": ["นำเกล็ดออกจากตัวปลา กรีดบนผิวหนัง แล้วเทน้ำเดือดลงไปเพื่อให้แข็งตัว หั่นขิง 2 ถึง 3 ชิ้นเป็นชิ้นบางๆ แล้วใช้ส่วนที่เหลือเป็นขิงเข็ม", "ใส่ (A) และขิงซอยบางลงในกระทะ (เส้นผ่านศูนย์กลางประมาณ 26 ซม.) นำไปต้ม ใส่ปลาเนื้อเรียบปิดฝาแบบหยด แล้วเคี่ยวบนไฟร้อนปานกลางประมาณ 15 นาที จนของเหลวลดลงเหลือประมาณ 1/3", "วางปลาเนื้อเรียบลงในชาม เติมน้ำซุปแล้วเติมขิงลงไป"], "id": ["Buang sisik ikan, buat sayatan pada permukaan kulitnya, lalu tuangkan air mendidih di atasnya hingga membeku. Iris 2 hingga 3 potong jahe menjadi irisan tipis, dan gunakan sisanya sebagai jahe jarum.", "Tambahkan (A) dan jahe yang diiris tipis ke dalam penggorengan (diameter sekitar 26 cm), didihkan, masukkan ikan pipih, tutup dengan penutup, dan masak dengan api sedang selama kurang lebih 15 menit hingga cairannya berkurang menjadi sekitar 1/3.", "Tempatkan ikan pipih dalam mangkuk, tutupi dengan kaldu dan tambahkan jahe."], "ms": ["Keluarkan sisik ikan, buat hirisan pada permukaan kulit, dan tuangkan air mendidih ke atasnya untuk membekukannya. Hiris 2 hingga 3 keping halia menjadi kepingan nipis, dan gunakan selebihnya sebagai halia jarum.", "Masukkan (A) dan halia yang dihiris nipis ke dalam kuali (kira-kira 26 cm diameter), biarkan mendidih, masukkan ikan kembung, tutup dengan penutup titisan, dan reneh dengan api sederhana selama kira-kira 15 minit sehingga cecair telah berkurangan kepada kira-kira 1/3.", "Letakkan ikan kembung dalam mangkuk, tutup dengan sup dan masukkan halia."], "ko": ["카레는 비늘을 꺼내 껍질의 표면에 자르고 따뜻한 물을 뿌려 서리로 한다. 생강은 2~3장은 으깬 자르고 나머지는 바늘 생강으로 만든다.", "프라이팬(지름 26cm 기준)에 (A)와 생강의 으깬 자르기를 넣고 끓여서, 찜을 넣고 떨어뜨리는 돼지를 하고, 중불로 15분 정도, 삶은 국물이 1/3 양위가 될 때까지 끓인다.", "그릇에 청결을 담고 삶은 국물을 뿌려 바늘 생강을 곁들인다."]}}, {"id": "43d81172", "source_url": "https://www.kikkoman.co.jp/homecook/search/recipe/00052746/", "source_site": "Kikkoman", "image": "https://images.weserv.nl/?url=https://www.kikkoman.co.jp/homecook/assets/img/00052746.jpg&w=600&output=jpg", "title": {"en": "Easy and raw! Standard braised braised meat", "zh_tw": "簡單又原始！標準紅燒紅燒肉", "zh_cn": "简单又原始！标准红烧红烧肉", "vi": "Dễ dàng và thô! Thịt kho tiêu chuẩn", "hi": "आसान और कच्चा! मानक ब्रेज़्ड ब्रेज़्ड मांस", "ru": "Легко и сыро! Стандартное тушеное тушеное мясо", "th": "ง่ายและดิบ! เนื้อตุ๋นมาตรฐาน", "id": "Mudah dan mentah! Daging rebus rebus standar", "ms": "Mudah dan mentah! Daging rebus standard", "ko": "사보생으로 간단! 스테디셀러 각 삶은"}, "title_ja": "しぼ生で簡単！定番の角煮", "desc": {"en": "", "zh_tw": "", "zh_cn": "", "vi": "", "hi": "", "ru": "", "th": "", "id": "", "ms": "", "ko": ""}, "desc_ja": "", "ingredients": [{"name_ja": "豚バラ肉（かたまり）", "amount": "500g", "translated": {"en": "Pork belly (chunk)", "zh_tw": tps://search.rakuten.co.jp/search/mall/%E9%9D%92%E3%81%AD%E3%81%8E%EF%BC%88%E5%B0%8F%E5%8F%A3%E5%88%87%E3%82%8A%EF%BC%89/?tag="}, {"name_ja": "キッコーマンいつでも新鮮しぼりたて生しょうゆ", "amount": "大さじ3", "translated": {"en": "Kikkoman always freshly squeezed raw soy sauce", "zh_tw": "龜甲萬總是鮮榨生醬油", "zh_cn": "龟甲万总是鲜榨生酱油", "vi": "Kikkoman luôn vắt nước tương tươi", "hi": "किक्कोमन हमेशा ताजा निचोड़ा हुआ कच्चा सोया सॉस", "ru": "Kikkoman всегда свежевыжатый сырой соевый соус", "th": "คิคโคแมนคั้นซีอิ๊วดิบสดใหม่อยู่เสมอ", "id": "Kikkoman selalu diperas dengan kecap mentah segar", "ms": "Kikkoman sentiasa baru diperah kicap mentah", "ko": "Kikoman 언제든지 신선한 갓 구운 생 간장"}, "amazon": "https://www.amazon.co.jp/s?k=%E3%82%AD%E3%83%83%E3%82%B3%E3%83%BC%E3%83%9E%E3%83%B3%E3%81%84%E3%81%A4%E3%81%A7%E3%82%82%E6%96%B0%E9%AE%AE%E3%81%97%E3%81%BC%E3%82%8A%E3%81%9F%E3%81%A6%E7%94%9F%E3%81%97%E3%82%87%E3%81%86%E3%82%86&tag=", "rakuten": "https://search.rakuten.co.jp/search/mall/%E3%82%AD%E3%83%83%E3%82%B3%E3%83%BC%E3%83%9E%E3%83%B3%E3%81%84%E3%81%A4%E3%81%A7%E3%82%82%E6%96%B0%E9%AE%AE%E3%81%97%E3%81%BC%E3%82%8A%E3%81%9F%E3%81%A6%E7%94%9F%E3%81%97%E3%82%87%E3%81%86%E3%82%86/?tag="}, {"name_ja": "マンジョウ米麹こだわり仕込み本みりん", "amount": "大さじ3", "translated": {"en": "Manjou rice malt carefully prepared mirin", "zh_tw": "精心調製的滿洲米醂味醂", "zh_cn": "精心调制的满洲米醂味醂", "vi": "Rượu mạch nha Manjou mirin được chuẩn bị cẩn thận", "hi": "मंजौ चावल माल्ट सावधानीपूर्वक मिरिन तैयार किया गया", "ru": "Рисовый солод Manjou, тщательно приготовленный мирин", "th": "ข้าวมอลต์ Manjou ที่เตรียมมิรินอย่างพิถีพิถัน", "id": "Manjou rice malt menyiapkan mirin dengan hati-hati", "ms": "Manjou rice malt disediakan dengan teliti mirin", "ko": "Manjou 쌀 누룩 고집 구매 책 미린"}, "amazon": "https://www.amazon.co.jp/s?k=%E3%83%9E%E3%83%B3%E3%82%B8%E3%83%A7%E3%82%A6%E7%B1%B3%E9%BA%B9%E3%81%93%E3%81%A0%E3%82%8F%E3%82%8A%E4%BB%95%E8%BE%BC%E3%81%BF%E6%9C%AC%E3%81%BF%E3%82%8A%E3%82%93&tag=", "rakuten": "https://search.rakuten.co.jp/search/mall/%E3%83%9E%E3%83%B3%E3%82%B8%E3%83%A7%E3%82%A6%E7%B1%B3%E9%BA%B9%E3%81%93%E3%81%A0%E3%82%8F%E3%82%8A%E4%BB%95%E8%BE%BC%E3%81%BF%E6%9C%AC%E3%81%BF%E3%82%8A%E3%82%93/?tag="}, {"name_ja": "砂糖", "amount": "大さじ2", "translated": {"en": "sugar", "zh_tw": "糖", "zh_cn": "糖", "vi": "đường", "hi": "चीनी", "ru": "сахар", "th": "น้ำตาล", "id": "gula", "ms": "gula", "ko": "설탕"}, "amazon": "https://www.amazon.co.jp/s?k=%E7%A0%82%E7%B3%96&tag=", "rakuten": "https://search.rakuten.co.jp/search/mall/%E7%A0%82%E7%B3%96/?tag="}, {"name_ja": "水", "amount": "2カップ", "translated": {"en": "water", "zh_tw": "水", "zh_cn": "水", "vi": "Nước", "hi": "पानी", "ru": "вода", "th": "น้ำ", "id": "air", "ms": "air", "ko": "물"}, "amazon": "https://www.amazon.co.jp/s?k=%E6%B0%B4&tag=", "rakuten": "https://search.rakuten.co.jp/search/mall/%E6%B0%B4/?tag="}], "steps": {"en": ["Cut the pork into 8-inch cubes and thinly slice the ginger.", "Place the pork in a pot, add enough water to cover the meat, heat over medium heat, bring to a boil, then parboil over low heat for 30 minutes. *If the hot water gets low, add water.", "Combine (A) in a pot, bring to a boil over medium heat, add (2) and ginger, cover, and simmer over medium heat for about 15 minutes. Add the boiled eggs and simmer for another 15 minutes until a little bit of the broth remains, then turn off the heat and let it sit to let the flavors meld.", "Place in a bowl and sprinkle with green onions."], "zh_tw": ["將豬肉切成8吋的方塊，薑切成薄片。", "將豬肉放入鍋中，加入足夠的水淹沒肉，以中火加熱，煮沸，然後小火煮30分鐘。 *如果熱水變少，請加水。", "將(A)放入鍋中，中火煮滾，加入(2)和薑，蓋上鍋蓋，中火煮約15分鐘。加入水煮蛋，再煮 15 分鐘，直到只剩下一點湯汁，然後關火，靜置，讓味道融合。", "放入碗中，撒上蔥花。"], "zh_cn": ["将猪肉切成8英寸的方块，姜切成薄片。", "将猪肉放入锅中，加入足够的水淹没肉，中火加热，煮沸，然后小火煮30分钟。 *如果热水变少，请加水。", "将(A)放入锅中，中火煮滚，加入(2)和姜，盖上锅盖，中火煮约15分钟。加入煮鸡蛋，再煮 15 分钟，直到只剩下一点汤汁，然后关火，静置，让味道融合。", "放入碗中，撒上葱。"], "vi": ["Cắt thịt lợn thành khối 8 inch và cắt lát mỏng gừng.", "Cho thịt lợn vào nồi, thêm nước vừa đủ ngập thịt, đun trên lửa vừa, đun sôi rồi luộc trên lửa nhỏ trong 30 phút. *Nếu nước nóng xuống thấp, hãy thêm nước vào.", "Cho (A) vào nồi, đun sôi ở lửa vừa, thêm (2) và gừng, đậy nắp và đun trên lửa vừa trong khoảng 15 phút. Thêm trứng luộc vào đun nhỏ lửa thêm 15 phút nữa cho đến khi còn một ít nước dùng thì tắt bếp và để yên cho hương vị hòa quyện.", "Đặt vào một cái bát và rắc hành lá."], "hi": ["सूअर के मांस को 8 इंच के क्यूब्स में काटें और अदरक को पतला काट लें।", "सूअर के मांस को एक बर्तन में रखें, मांस को ढकने के लिए पर्याप्त पानी डालें, मध्यम आंच पर गर्म करें, उबाल लें, फिर धीमी आंच पर 30 मिनट तक उबालें। *अगर गर्म पानी कम हो जाए तो पानी डालें.", "एक बर्तन में (ए) मिलाएं, मध्यम आंच पर उबाल लें, (2) और अदरक डालें, ढक दें और मध्यम आंच पर लगभग 15 मिनट तक उबालें। उबले अंडे डालें और 15 मिनट तक और पकाएं जब तक कि थोड़ा सा शोरबा न रह जाए, फिर आंच बंद कर दें और इसे ऐसे ही छोड़ दें ताकि स्वाद घुल जाए।", "एक कटोरे में रखें और हरा प्याज छिड़कें।"], "ru": ["Нарежьте свинину кубиками размером 8 дюймов и тонкими ломтиками имбирь.", "Положите свинину в кастрюлю, залейте достаточным количеством воды, чтобы она покрыла мясо, нагрейте на среднем огне, доведите до кипения, затем варите на слабом огне 30 минут. *Если горячей воды становится мало, добавьте воды.", "Смешайте (А) в кастрюле, доведите до кипения на среднем огне, добавьте (2) и имбирь, накройте крышкой и варите на среднем огне около 15 минут. Добавьте вареные яйца и варите еще 15 минут, пока не останется немного бульона, затем выключите огонь и дайте настояться, чтобы вкусы смешались.", "Выложите в миску и посыпьте зеленым луком."], "th": ["หั่นหมูเป็นก้อนขนาด 8 นิ้ว และหั่นขิงเป็นชิ้นบางๆ", "วางหมูลงในหม้อ เติมน้ำให้พอท่วมเนื้อ ตั้งไฟปานกลาง นำไปต้ม จากนั้นนำไปนึ่งด้วยไฟอ่อนเป็นเวลา 30 นาที *หากน้ำร้อนเหลือน้อยให้เติมน้ำ", "รวม (A) ลงในหม้อ นำไปตั้งไฟปานกลาง ใส่ (2) และขิง ปิดฝา และเคี่ยวบนไฟร้อนปานกลางประมาณ 15 นาที ใส่ไข่ต้มและเคี่ยวต่ออีก 15 นาทีจนน้ำซุปเหลืออยู่เล็กน้อย จากนั้นปิดไฟและพักไว้เพื่อให้รสชาติละลาย", "วางในชามแล้วโรยด้วยหัวหอมสีเขียว"], "id": ["Potong daging babi menjadi kubus berukuran 8 inci dan iris tipis jahe.", "Masukkan daging babi ke dalam panci, tambahkan air secukupnya hingga menutupi daging, panaskan dengan api sedang, didihkan, lalu rebus setengah matang dengan api kecil selama 30 menit. *Jika air panas menyusut, tambahkan air.", "Campurkan (A) dalam panci, didihkan dengan api sedang, tambahkan (2) dan jahe, tutup, dan didihkan dengan api sedang selama sekitar 15 menit. Tambahkan telur rebus dan masak lagi selama 15 menit hingga kuahnya tersisa sedikit, lalu matikan api dan diamkan agar bumbunya meleleh.", "Tempatkan dalam mangkuk dan taburi dengan daun bawang."], "ms": ["Potong daging babi menjadi kiub 8 inci dan hiris nipis halia.", "Letakkan daging babi dalam periuk, masukkan air secukupnya untuk menutupi daging, panaskan dengan api sederhana, biarkan mendidih, kemudian rebus dengan api perlahan selama 30 minit. *Jika air panas surut, masukkan air.", "Satukan (A) dalam periuk, biarkan mendidih dengan api sederhana, tambah (2) dan halia, tutup, dan reneh dengan api sederhana selama kira-kira 15 minit. Masukkan telur rebus dan reneh selama 15 minit lagi sehingga tinggal sedikit kuahnya, kemudian tutup api dan biarkan ia meresap untuk meresap.", "Letakkan dalam mangkuk dan taburkan dengan bawang hijau."], "ko": ["돼지고기는 8등분의 모퉁이로 하고, 생강은 으깬 자른다.", "냄비에 돼지고기를 넣고 고기가 확실히 물집 정도의 물을 넣고 중불에 걸고 끓여 오면 약불로 30분 내려간다. ※탕이 적어지면 물을 더한다", "냄비에 (A)를 맞추고 중불로 끓인 다음 (2)와 생강을 넣고 떨어뜨리는 돼지를 하고 약한 중불로 15분 정도 끓인다. 삶은 달걀을 넣고 한층 더 15분 정도 삶은 국물이 조금 남는 정도까지 끓여 불을 멈추고 그대로 두고 맛을 익힌다.", "그릇에 담아 파파를 뿌린다."]}}, {"id": "f38bcfdf", "source_url": "https://www.kikkoman.co.jp/homecook/search/recipe/00004783/", "source_site": "Kikkoman", "image": "https://images.weserv.nl/?url=https://www.kikkoman.co.jp/homecook/assets/img/00004783.jpg&w=600&output=jpg", "title": {"en": "Lotus root scent Kinpira", "zh_tw": "蓮藕香 金比拉", "zh_cn": "莲藕香 金比拉", "vi": "Mùi hương củ sen Kinpira", "hi": "कमल मूल गंध किन्पीरा", "ru": "Аромат корня лотоса Кинпира", "th": "กลิ่นรากบัวคินพิระ", "id": "Aroma akar teratai Kinpira", "ms": "Bau 83%B3%E3%82%B8%E3%83%A7%E3%82%A6%E5%9B%BD%E7%94%A3%E7%B1%B3%E3%80%80%E6%9C%AC%E3%81%BF%E3%82%8A%E3%82%93&tag=", "rakuten": "https://search.rakuten.co.jp/search/mall/%E3%83%9E%E3%83%B3%E3%82%B8%E3%83%A7%E3%82%A6%E5%9B%BD%E7%94%A3%E7%B1%B3%E3%80%80%E6%9C%AC%E3%81%BF%E3%82%8A%E3%82%93/?tag="}, {"name_ja": "砂糖", "amount": "大さじ1", "translated": {"en": "sugar", "zh_tw": "糖", "zh_cn": "糖", "vi": "đường", "hi": "चीनी", "ru": "сахар", "th": "น้ำตาล", "id": "gula", "ms": "gula", "ko": "설탕"}, "amazon": "https://www.amazon.co.jp/s?k=%E7%A0%82%E7%B3%96&tag=", "rakuten": "https://search.rakuten.co.jp/search/mall/%E7%A0%82%E7%B3%96/?tag="}], "steps": {"en": ["Slice the lotus root into 5mm thick rounds or half moons. Cut the carrots into 5mm-thick half-moon or ginkgo slices.", "Add sesame oil and red chili pepper to a frying pan, heat over medium heat, and fry pork, lotus root, and carrot in that order.", "Add (A) to (2) and stir-fry until the liquid evaporates."], "zh_tw": ["將蓮藕切成5毫米厚的圓形或半月形。將紅蘿蔔切成5毫米厚的半月形或銀杏片。", "煎鍋中加入芝麻油和紅辣椒，以中火加熱，依序煎豬肉、蓮藕和胡蘿蔔。", "將(A)加入(2)中，炒至液體蒸發。"], "zh_cn": ["将莲藕切成5毫米厚的圆形或半月形。将胡萝卜切成5毫米厚的半月形或银杏片。", "煎锅中加入芝麻油和红辣椒，中火加热，依次煎猪肉、莲藕和胡萝卜。", "将(A)加入(2)中，炒至液体蒸发。"], "vi": ["Cắt củ sen thành những miếng tròn hoặc nửa mặt trăng dày 5mm. Cắt cà rốt thành lát hình bán nguyệt hoặc bạch quả dày 5mm.", "Cho dầu mè và ớt đỏ vào chảo, đun nóng ở lửa vừa rồi xào thịt lợn, củ sen và cà rốt theo thứ tự.", "Thêm (A) vào (2) và xào cho đến khi chất lỏng bay hơi."], "hi": ["कमल की जड़ को 5 मिमी मोटे गोल या आधे चन्द्राकार टुकड़ों में काटें। गाजर को 5 मिमी मोटे अर्धचंद्राकार या जिन्कगो स्लाइस में काटें।", "एक फ्राइंग पैन में तिल का तेल और लाल मिर्च डालें, मध्यम आंच पर गर्म करें और उसी क्रम में सूअर का मांस, कमल की जड़ और गाजर को भूनें।", "(ए) को (2) में जोड़ें और तब तक भूनें जब तक कि तरल वाष्पित न हो जाए।"], "ru": ["Нарежьте корень лотоса на кружочки или полумесяцы толщиной 5 мм. Морковь нарежьте ломтиками полумесяца или гинкго толщиной 5 мм.", "Добавьте в сковороду кунжутное масло и красный перец чили, нагрейте на среднем огне и обжарьте в указанном порядке свинину, корень лотоса и морковь.", "Добавьте (А) к (2) и жарьте, помешивая, пока жидкость не выпарится."], "th": ["หั่นรากบัวเป็นวงกลมหนา 5 มม. หรือพระจันทร์ครึ่งเสี้ยว ตัดแครอทเป็นชิ้นฮาล์ฟมูนหรือแปะก๊วยหนา 5 มม.", "ใส่น้ำมันงาและพริกแดงลงในกระทะ ตั้งไฟปานกลาง จากนั้นผัดหมู รากบัว และแครอทตามลำดับ", "เพิ่ม (A) ถึง (2) และผัดจนของเหลวระเหย"], "id": ["Iris akar teratai menjadi bulatan setebal 5 mm atau setengah bulan. Potong wortel menjadi irisan setengah bulan atau ginkgo setebal 5 mm.", "Tambahkan minyak wijen dan cabai merah ke dalam wajan, panaskan dengan api sedang, lalu goreng daging babi, akar teratai, dan wortel secara berurutan.", "Tambahkan (A) ke (2) dan tumis sampai cairannya menguap."], "ms": ["Potong akar teratai menjadi bulatan setebal 5mm atau separuh bulan. Potong lobak merah menjadi kepingan separuh bulan atau ginkgo setebal 5mm.", "Masukkan minyak bijan dan lada cili merah ke dalam kuali, panaskan dengan api sederhana, dan goreng daging babi, akar teratai, dan lobak merah dalam urutan itu.", "Masukkan (A) kepada (2) dan tumis sehingga cecair sejat."], "ko": ["벽돌은 5mm 두께의 둥근 자르기, 또는 반월 자르기로 한다. 당근은 5mm 간격의 반월 자르기 또는 한 자른다.", "프라이팬에 참기름과 붉은 고추를 넣고 중불로 가열하고 돼지고기, 연근, 당근 순으로 볶는다.", "(2)에 (A)를 넣고 국물이 사라질 때까지 볶는다."]}}, {"id": "b5846060", "source_url": "https://www.kikkoman.co.jp/homecook/search/recipe/00052955/", "source_site": "Kikkoman", "image": "https://images.weserv.nl/?url=https://www.kikkoman.co.jp/homecook/assets/img/00052955.jpg&w=600&output=jpg", "title": {"en": "Easy and raw! Standard yellowtail radish", "zh_tw": "簡單又原始！標準黃尾蘿蔔", "zh_cn": "简单又原始！标准黄尾萝卜", "vi": "Dễ dàng và thô! Củ cải đuôi vàng tiêu chuẩn", "hi": "आसान और कच्चा! मानक पीली पूंछ वाली मूली", "ru": "Легко и сыро! Стандартный желтохвостый редис", "th": "ง่ายและดิบ! หัวไชเท้าหางเหลืองมาตรฐาน", "id": "Mudah dan mentah! Lobak ekor kuning standar", "ms": "Mudah dan mentah! Lobak kuning standard", "ko": "사보생으로 간단! earch/mall/%E6%B0%B4/?tag="}], "steps": {"en": ["Cut the yellowtail into bite-sized pieces and pour boiling water over them to frost them. Cut the radish into 1.5cm-thick half-moons and heat in the microwave (600W) for 7 to 8 minutes. Thinly slice the ginger and finely chop the yuzu peel.", "Combine (A) and ginger in a frying pan (approximately 26 cm in diameter), bring to a boil, add yellowtail and radish, cover and simmer for 10 to 15 minutes, then turn off the heat and simmer.", "Place in a bowl and sprinkle with green onions."], "zh_tw": ["將鰤魚切成一口大小的塊，倒入沸水使其結霜。將蘿蔔切成1.5公分厚的半月形，放入微波爐（600W）加熱7至8分鐘。將生薑切成薄片，柚子皮切碎。", "將(A)和薑放入煎鍋(直徑約26公分)中，煮滾，加入鰤魚和蘿蔔，蓋上鍋蓋煮10至15分鐘，然後關火煮。", "放入碗中，撒上蔥花。"], "zh_cn": ["将鰤鱼切成一口大小的块，倒入沸水以使其结霜。将萝卜切成1.5厘米厚的半月形，放入微波炉（600W）加热7至8分钟。将生姜切成薄片，柚子皮切碎。", "将(A)和姜放入煎锅(直径约26厘米)中，煮滚，加入鰤鱼和萝卜，盖上锅盖煮10至15分钟，然后关火煮。", "放入碗中，撒上葱。"], "vi": ["Cắt đuôi vàng thành từng miếng vừa ăn và đổ nước sôi lên trên để làm đông chúng. Cắt củ cải thành hình bán nguyệt dày 1,5cm và đun nóng trong lò vi sóng (600W) trong 7 đến 8 phút. Cắt lát mỏng gừng và thái nhỏ vỏ yuzu.", "Cho (A) và gừng vào chảo rán (đường kính khoảng 26 cm), đun sôi, thêm đuôi vàng và củ cải, đậy nắp và đun nhỏ lửa trong 10 đến 15 phút thì tắt lửa và đun nhỏ lửa.", "Đặt vào một cái bát và rắc hành lá."], "hi": ["पीली पूंछ को काटने के आकार के टुकड़ों में काटें और उन्हें ठंडा करने के लिए उनके ऊपर उबलता पानी डालें। मूली को 1.5 सेमी मोटे टुकड़ों में काटें और माइक्रोवेव (600W) में 7 से 8 मिनट तक गर्म करें। अदरक को पतला-पतला काट लें और युज़ु के छिलके को भी बारीक काट लें।", "एक फ्राइंग पैन (लगभग 26 सेमी व्यास) में (ए) और अदरक मिलाएं, उबाल लें, पीली पूंछ और मूली डालें, ढक दें और 10 से 15 मिनट तक उबालें, फिर आंच बंद कर दें और धीमी आंच पर पकाएं।", "एक कटोरे में रखें और हरा प्याज छिड़कें।"], "ru": ["Нарежьте желтохвоста небольшими кусочками и залейте их кипятком, чтобы они заморозились. Нарежьте редис полумесяцами толщиной 1,5 см и нагрейте в микроволновой печи (600 Вт) в течение 7–8 минут. Тонко нарежьте имбирь и мелко нарежьте кожуру юдзу.", "Смешайте (А) и имбирь в сковороде (диаметром примерно 26 см), доведите до кипения, добавьте желтохвост и редис, накройте крышкой и тушите 10–15 минут, затем выключите огонь и тушите.", "Выложите в миску и посыпьте зеленым луком."], "th": ["ตัดหางเหลืองเป็นชิ้นขนาดพอดีคำแล้วเทน้ำเดือดลงไปเพื่อให้แข็งตัว หั่นหัวไชเท้าเป็นพระจันทร์ครึ่งเสี้ยวหนา 1.5 ซม. แล้วนำไปให้ความร้อนในไมโครเวฟ (600W) เป็นเวลา 7 ถึง 8 นาที หั่นขิงเป็นชิ้นบางๆ และสับเปลือกยูซุอย่างประณีต", "รวม (A) และขิงในกระทะ (เส้นผ่านศูนย์กลางประมาณ 26 ซม.) นำไปต้ม ใส่หางเหลืองและหัวไชเท้า ปิดฝาและเคี่ยวประมาณ 10 ถึง 15 นาที จากนั้นปิดไฟและเคี่ยว", "วางในชามแล้วโรยด้วยหัวหอมสีเขียว"], "id": ["Potong ekor kuning menjadi potongan-potongan kecil dan tuangkan air mendidih ke atasnya untuk membekukannya. Potong lobak menjadi bentuk setengah bulan setebal 1,5 cm dan panaskan dalam microwave (600W) selama 7 hingga 8 menit. Iris tipis jahe dan cincang halus kulit yuzu.", "Campurkan (A) dan jahe dalam wajan (diameter kurang lebih 26 cm), didihkan, tambahkan ekor kuning dan lobak, tutup dan biarkan mendidih selama 10 hingga 15 menit, lalu matikan api dan biarkan mendidih.", "Tempatkan dalam mangkuk dan taburi dengan daun bawang."], "ms": ["Potong ekor kuning menjadi kepingan bersaiz gigitan dan tuangkan air mendidih ke atasnya untuk membekukannya. Potong lobak kepada separuh bulan setebal 1.5cm dan panaskan dalam ketuhar gelombang mikro (600W) selama 7 hingga 8 minit. Hiris nipis halia dan cincang halus kulit yuzu.", "Satukan (A) dan halia dalam kuali (diameter lebih kurang 26 cm), masak sehingga mendidih, masukkan kuning dan lobak, tutup dan reneh selama 10 hingga 15 minit, kemudian tutup api dan reneh.", "Letakkan dalam mangkuk dan taburkan dengan bawang hijau."], "ko": ["부리는 한 입으로 썰어, 열탕을 걸어 서리 척한다. 무는 1.5cm 두께의 반월절로 하고, 전자레인지(600W)로 7~8분 가열한다. 생강은 얇게 썬다.", "프라이팬(직경 26cm 기준)에 (A)와 생강을 합쳐서 끓여서, 무와 무를 넣고, 떨어뜨린 돼지를 10~15분 끓여 불을 멈추고 끓인다.", "그릇에 담아 파파를 뿌린다."]}}, {"id": "b94d6dfc", "source_url": "h nutes, then heat through and add (B)."], "zh_tw": ["將辣椒縱向切成兩半，去除莖和種子，並在內部輕輕撒上麵粉。", "做肉丸。將(A)從上往下依序加入碗中，每次攪拌均勻。當它變得粘稠時，將其分成6等份，裝入（1）中，然後在表面輕輕撒上麵粉。", "煎鍋中加入油，小火加熱，將（2）肉麵朝下，蓋上鍋蓋，蒸3至4分鐘。褐色時，翻面，再蓋上鍋蓋，蒸4至5分鐘，然後熱透，加入(B)。"], "zh_cn": ["将辣椒纵向切成两半，去除茎和种子，并在内部轻轻撒上面粉。", "做肉丸。将(A)从上往下依次加入碗中，每次搅拌均匀。当它变得粘稠时，将其分成6等份，装入（1）中，然后在表面轻轻撒上面粉。", "煎锅中加入油，小火加热，将（2）肉面朝下，盖上锅盖，蒸3至4分钟。呈褐色时，翻面，再盖上锅盖，蒸4至5分钟，然后热透，加入(B)。"], "vi": ["Cắt ớt làm đôi theo chiều dọc, bỏ cuống và hạt rồi rắc nhẹ bột mì vào bên trong.", "Làm thịt viên. Thêm (A) theo thứ tự từ trên xuống tô và trộn đều mỗi lần. Khi đã dẻo, chia thành 6 phần bằng nhau và gói vào (1), sau đó rắc nhẹ bột mì lên bề mặt.", "Cho dầu vào chảo, đun trên lửa nhỏ, đặt (2) mặt thịt xuống, đậy nắp và chiên bằng hơi nước trong 3 đến 4 phút. Khi chín vàng, lật lại, đậy nắp lại và chiên bằng hơi nước trong 4 đến 5 phút, sau đó đun nóng và thêm (B)."], "hi": ["मिर्च को लंबाई में आधा काटें, डंठल और बीज हटा दें और अंदर से हल्का आटा छिड़कें।", "मीटबॉल बनाओ. कटोरे में ऊपर से क्रम में (ए) डालें और हर बार अच्छी तरह मिलाएँ। जब यह चिपचिपा हो जाए तो इसे 6 बराबर भागों में बांट लें और (1) में पैक कर दें, फिर सतह पर हल्के से आटा छिड़कें।", "एक फ्राइंग पैन में तेल डालें, धीमी आंच पर गर्म करें, (2) मांस को नीचे रखें, ढक दें और 3 से 4 मिनट तक भाप में भूनें। जब भूरा हो जाए, तो पलट दें, फिर से ढक दें और 4 से 5 मिनट तक भाप में भूनें, फिर गर्म करें और (बी) डालें।"], "ru": ["Разрежьте перцы вдоль пополам, удалите плодоножки и семена и слегка присыпьте внутреннюю часть мукой.", "Сделайте фрикадельки. Добавляйте (А) по порядку сверху в миску и каждый раз хорошо перемешивайте. Когда оно станет липким, разделите его на 6 равных частей и сложите в (1), затем слегка присыпьте поверхность мукой.", "Добавьте масло в сковороду, нагрейте на слабом огне, положите (2) мясом вниз, накройте крышкой и жарьте на пару 3–4 минуты. Когда подрумянится, переверните, снова накройте крышкой и жарьте на пару 4–5 минут, затем прогрейте и добавьте (B)."], "th": ["ผ่าครึ่งพริกตามยาว เอาก้านและเมล็ดออก แล้วโรยแป้งด้านในเล็กน้อย", "ทำลูกชิ้น. เติม (A) ตามลำดับจากด้านบนลงชาม และผสมให้เข้ากันในแต่ละครั้ง เมื่อเหนียวแล้วให้แบ่งเป็น 6 ส่วนเท่าๆ กัน แล้วแพ็คเป็น (1) แล้วโรยหน้าด้วยแป้งเล็กน้อย", "ใส่น้ำมันลงในกระทะ ตั้งไฟอ่อน วาง (2) ด้านเนื้อลง ปิดฝา และทอดด้วยไอน้ำเป็นเวลา 3 ถึง 4 นาที เมื่อเป็นสีน้ำตาล ให้พลิกกลับ ปิดฝาอีกครั้ง และนึ่งประมาณ 4 ถึง 5 นาที จากนั้นให้ความร้อนผ่าน และเติม (B)"], "id": ["Potong paprika menjadi dua memanjang, buang batang dan bijinya, lalu taburi sedikit bagian dalamnya dengan tepung.", "Buat baksonya. Tambahkan (A) secara berurutan dari atas ke dalam mangkuk dan aduk rata setiap kali. Jika sudah lengket, bagi menjadi 6 bagian sama besar dan masukkan ke dalam (1), lalu taburi sedikit permukaannya dengan tepung.", "Tambahkan minyak ke dalam penggorengan, panaskan dengan api kecil, letakkan (2) daging menghadap ke bawah, tutupi, dan goreng dengan uap selama 3 hingga 4 menit. Jika sudah kecoklatan, balikkan, tutup kembali, dan goreng dengan uap selama 4 sampai 5 menit, lalu panaskan dan tambahkan (B)."], "ms": ["Potong lada separuh memanjang, keluarkan batang dan biji, dan sedikit taburkan bahagian dalam dengan tepung.", "Buat bebola daging. Tambah (A) mengikut urutan dari atas ke mangkuk dan gaul rata setiap kali. Apabila sudah melekit, bahagikan kepada 6 bahagian yang sama dan bungkus kepada (1), kemudian taburkan sedikit permukaan dengan tepung.", "Masukkan minyak ke dalam kuali, panaskan dengan api perlahan, letakkan (2) daging di bahagian bawah, tutup, dan goreng kukus selama 3 hingga 4 minit. Apabila sudah keperangan, balikkan, tutup semula, dan goreng kukus selama 4 hingga 5 minit, kemudian panaskan dan masukkan (B)."], "ko": ["피망은 세로 절반으로 자르고 씨앗을 잡고 안쪽에 밀가루를 얇게 뿌린다.", "고기군요를 만든다. 그릇에 (A)를 위에서 순서대로 넣고 그 때마다 잘 섞어 끈기가 나와 정리되면 6등분하고 (1)에 담아 표면에 밀가루를 얇게 뿌린다.", "프라이팬에 기름을 넣고 약한 불로 가열하고, (2)를 고기의 면을 아래로 하여 나란히 넣어 뚜껑을 덮고, 3~4분 찜구이로 한다. 구운 색이 붙으면 뒤집어 다시 뚜껑을 덮고, 4~5분 찜 구이로 하고 불을 통해(B)를 더해 굽는다."]}}, {"id": "49d4e6ff", "source_url": "https://www.kikkoman.co.jp/homecook/search/recipe/00002617/", "source_site": "Kikkoman", "image": "https://images.weserv.nl/?url=https://www.kikkoman.co.jp/homecook/assets/img/00002617.jpg&w=600&output=jpg", "title": {"en": "Avoid bitterness! Basic bitter gourd chanpuru [Simple and popular stir-fry, only seasoned with raw soy sauce]", "zh_tw": "避免苦味！基本苦瓜chanpuru【簡單大眾炒菜，只用生抽調味】", "zh_cn": "避免苦味！基本苦瓜chanpuru【简单大众炒菜，只用生抽调味】", "vi": "Tránh cay đắng! Chanpuru mướp đắng cơ bản [Món xào đơn giản và phổ biến, chỉ nêm với nước tương thô]", "hi": "कड़वाहट से बचें! मूल करेला चनापुरू [सरल और लोकप्रिय हलचल-तलना, केवल कच्चे सोया सॉस के साथ अनुभवी]", "ru": "Избегайте горечи! Базовый чанпуру из горькой тыквы [простое и популярное жаркое, только приправленное сырым соевым соусом]", "th": "หลีกเลี่ยงความขมขื่น! ชะปุรุมะระขั้นพื้นฐาน [ผัดง่ายๆ ยอดนิยม ปรุงรสด้วยซีอิ๊วดิบเท่านั้น]", "id": "Hindari kepahitan! Chanpuru labu pahit dasar [Tumis sederhana dan populer, hanya dibumbui dengan kecap mentah]", "ms": "Elakkan kepahitan! Peria asas chanpuru [Tumis yang ringkas dan popular, hanya diperisakan dengan kicap mentah]", "ko": "쓴 히카에메! 기본의 고야챤뿌루【심플하고 인기의 볶음맛 맛은 생 간장만】"}, "title_ja": "苦みひかえめ！基本のゴーヤチャンプルー【シンプルで人気の炒め物　味つけは生しょうゆだけ】", "desc": {"en": "", "zh_tw": "", "zh_cn": "", "vi": "", "hi": "", "ru": "", "th": "", "id": "", "ms": "", "ko": ""}, "desc_ja": "", "ingredients": [{"name_ja": "豚バラ肉（薄切り）", "amount": "100g", "translated": {"en": "Pork belly (thinly sliced)", "zh_tw": "五花肉（切成薄片）", "zh_cn": "五花肉（切成薄片）", "vi": "Thịt ba chỉ (thái lát mỏng)", "hi": "पोर्क बेली (पतला कटा हुआ)", "ru": "Свиная грудинка (тонко нарезанная)", "th": "หมูสามชั้น (หั่นบาง ๆ )", "id": "Perut babi (iris tipis)", "ms": "Perut babi (dihiris nipis)", "ko": "돼지 장미 고기 (얇게 썬)"}, "amazon": "https://www.amazon.co.jp/s?k=%E8%B1%9A%E3%83%90%E3%83%A9%E8%82%89%EF%BC%88%E8%96%84%E5%88%87%E3%82%8A%EF%BC%89&tag=", "rakuten": "https://search.rakuten.co.jp/search/mall/%E8%B1%9A%E3%83%90%E3%83%A9%E8%82%89%EF%BC%88%E8%96%84%E5%88%87%E3%82%8A%E n": "https://search.rakuten.co.jp/search/mall/%E3%81%94%E3%81%BE%E6%B2%B9/?tag="}, {"name_ja": "キッコーマンいつでも新鮮しぼりたて生しょうゆ", "amount": "大さじ1", "translated": {"en": "Kikkoman always freshly squeezed raw soy sauce", "zh_tw": "龜甲萬總是鮮榨生醬油", "zh_cn": "龟甲万总是鲜榨生酱油", "vi": "Kikkoman luôn vắt nước tương tươi", "hi": "किक्कोमन हमेशा ताजा निचोड़ा हुआ कच्चा सोया सॉस", "ru": "Kikkoman всегда свежевыжатый сырой соевый соус", "th": "คิคโคแมนคั้นซีอิ๊วดิบสดใหม่อยู่เสมอ", "id": "Kikkoman selalu diperas dengan kecap mentah segar", "ms": "Kikkoman sentiasa baru diperah kicap mentah", "ko": "Kikoman 언제든지 신선한 갓 구운 생 간장"}, "amazon": "https://www.amazon.co.jp/s?k=%E3%82%AD%E3%83%83%E3%82%B3%E3%83%BC%E3%83%9E%E3%83%B3%E3%81%84%E3%81%A4%E3%81%A7%E3%82%82%E6%96%B0%E9%AE%AE%E3%81%97%E3%81%BC%E3%82%8A%E3%81%9F%E3%81%A6%E7%94%9F%E3%81%97%E3%82%87%E3%81%86%E3%82%86&tag=", "rakuten": "https://search.rakuten.co.jp/search/mall/%E3%82%AD%E3%83%83%E3%82%B3%E3%83%BC%E3%83%9E%E3%83%B3%E3%81%84%E3%81%A4%E3%81%A7%E3%82%82%E6%96%B0%E9%AE%AE%E3%81%97%E3%81%BC%E3%82%8A%E3%81%9F%E3%81%A6%E7%94%9F%E3%81%97%E3%82%87%E3%81%86%E3%82%86/?tag="}, {"name_ja": "かつお節", "amount": "適宜", "translated": {"en": "Bonito flakes", "zh_tw": "鰹魚片", "zh_cn": "鲣鱼片", "vi": "mảnh cá ngừ", "hi": "बोनिटो गुच्छे", "ru": "хлопья скумбрии", "th": "โบนิโตเกล็ด", "id": "serpihan bonito", "ms": "Serpihan bonito", "ko": "가다랭이"}, "amazon": "https://www.amazon.co.jp/s?k=%E3%81%8B%E3%81%A4%E3%81%8A%E7%AF%80&tag=", "rakuten": "https://search.rakuten.co.jp/search/mall/%E3%81%8B%E3%81%A4%E3%81%8A%E7%AF%80/?tag="}], "steps": {"en": ["Cut the pork into 4-5cm lengths. Cut the bitter gourd in half lengthwise, remove the seeds and membrane with a spoon, and cut into 5mm pieces. Rub it with salt, leave it for about 5 minutes, and rinse it off with running water. Drain the tofu and cut into bite-sized pieces. Beat the eggs.", "Heat sesame oil in a frying pan over medium heat, add tofu and stir-fry until browned, then add bitter melon and pork and stir-fry.", "Once it's cooked, season it with raw soy sauce, pour in the beaten egg and let it cook quickly. Place in a bowl and sprinkle with bonito flakes if desired."], "zh_tw": ["將豬肉切成4-5公分的長度。將苦瓜縱向切成兩半，用湯匙除去籽和膜，切成5毫米的塊狀。用鹽擦拭，放置約5分鐘，然後用流水沖掉。將豆腐瀝乾水分，切成一口大小的塊狀。打雞蛋。", "煎鍋中以中火燒熱芝麻油，加入豆腐炒至焦黃，然後加入苦瓜和豬肉翻炒。", "煮熟後，用生抽調味，倒入打散的雞蛋，快速煮熟。如果需要的話，放入碗中，撒上鰹魚片。"], "zh_cn": ["将猪肉切成4-5厘米的长度。将苦瓜纵向切成两半，用勺子除去籽和膜，切成5毫米的块。用盐擦拭，放置约5分钟，然后用流水冲洗掉。将豆腐沥干水分，切成一口大小的块。打鸡蛋。", "煎锅中用中火烧热芝麻油，加入豆腐炒至焦黄，然后加入苦瓜和猪肉翻炒。", "煮熟后，用生抽调味，倒入打散的鸡蛋，快速煮熟。如果需要的话，放入碗中，撒上鲣鱼片。"], "vi": ["Cắt thịt lợn thành từng đoạn dài 4-5 cm. Cắt mướp đắng làm đôi theo chiều dọc, dùng thìa loại bỏ hạt và màng rồi cắt thành từng miếng 5mm. Chà xát với muối, để khoảng 5 phút rồi rửa sạch bằng nước. Đậu hủ để ráo nước và cắt thành miếng vừa ăn. Đánh trứng.", "Đun nóng dầu mè trong chảo trên lửa vừa, cho đậu phụ vào xào chín vàng, sau đó cho mướp đắng và thịt lợn vào xào.", "Sau khi chín, nêm với nước tương sống, đổ trứng đã đánh vào và nấu nhanh. Đặt vào tô và rắc cá ngừ bào nếu muốn."], "hi": ["सूअर के मांस को 4-5 सेमी लंबाई में काटें। करेले को लंबाई में आधा काट लें, चम्मच से बीज और झिल्ली हटा दें और 5 मिमी के टुकड़ों में काट लें। इसे नमक से रगड़ें, लगभग 5 मिनट के लिए छोड़ दें और बहते पानी से धो लें। टोफू को छान लें और छोटे टुकड़ों में काट लें। अंडे मारो.", "एक फ्राइंग पैन में मध्यम आंच पर तिल का तेल गर्म करें, उसमें टोफू डालें और भूरा होने तक भूनें, फिर करेले और सूअर का मांस डालें और हिलाएं।", "एक बार जब यह पक जाए, तो इसमें कच्ची सोया सॉस डालें, फेंटा हुआ अंडा डालें और इसे जल्दी पकने दें। एक कटोरे में रखें और यदि चाहें तो बोनिटो फ्लेक्स छिड़कें।"], "ru": ["Свинину нарезаем кусочками длиной 4-5 см. Разрежьте горькую тыкву вдоль пополам, удалите ложкой семена и мембраны и нарежьте кусочками толщиной 5 мм. Натрите его солью, оставьте примерно на 5 минут и смойте проточной водой. Слейте воду с тофу и нарежьте его небольшими кусочками. Взбейте яйца.", "Нагрейте кунжутное масло в сковороде на среднем огне, добавьте тофу и обжарьте, пока он не подрумянится, затем добавьте горькую дыню и свинину и обжарьте, помешивая.", "Когда блюдо будет готово, заправьте его сырым соевым соусом, влейте взбитое яйцо и дайте ему быстро приготовиться. Поместите в миску и при желании посыпьте хлопьями скумбрии."], "th": ["หั่นหมูเป็นชิ้นยาว 4-5 ซม. หั่นมะระเป็นครึ่งตามยาว ใช้ช้อนเอาเมล็ดและเยื่อออก แล้วหั่นเป็นชิ้นขนาด 5 มม. ถูด้วยเกลือ ทิ้งไว้ประมาณ 5 นาที แล้วล้างออกด้วยน้ำไหล ระบายเต้าหู้แล้วหั่นเป็นชิ้นขนาดพอดีคำ ตีไข่.", "ตั้งน้ำมันงาในกระทะบนไฟร้อนปานกลาง ใส่เต้าหู้ลงไปผัดจนเป็นสีน้ำตาล จากนั้นใส่มะระและหมูลงไปผัด", "เมื่อสุกแล้ว ปรุงรสด้วยซีอิ๊วดิบ ใส่ไข่ที่ตีแล้วปล่อยให้สุกอย่างรวดเร็ว วางในชามแล้วโรยด้วยเกล็ดโบนิโตหากต้องการ"], "id": ["Potong daging babi menjadi panjang 4-5cm. Potong pare menjadi dua memanjang, buang biji dan selaputnya dengan sendok, lalu potong-potong berukuran 5 mm. Gosok dengan garam, diamkan kurang lebih 5 menit, lalu bilas dengan air mengalir. Tiriskan tahu dan potong-potong seukuran sekali gigit. Kocok telurnya.", "Panaskan minyak wijen dalam wajan dengan api sedang, masukkan tahu, tumis hingga kecoklatan, lalu masukkan pare dan daging babi, tumis.", "Setelah matang bumbui dengan kecap mentah, tuang telur kocok dan biarkan cepat matang. Tempatkan dalam mangkuk dan taburi dengan serpihan bonito jika diinginkan."], "ms": ["Potong daging babi menjadi 4-5cm panjang. Potong peria separuh memanjang, keluarkan biji dan selaputnya dengan sudu, dan potong 5mm. Gosok dengan garam, biarkan selama kira-kira 5 minit, dan bilas dengan air yang mengalir. Toskan tauhu dan potong bersaiz gigitan. Pukul telur.", "Panaskan minyak bijan dalam kuali dengan api sederhana, masukkan tauhu dan tumis hingga keperangan, kemudian masukkan peria dan daging babi dan tumis.", "Setelah masak, perasakan dengan kicap mentah, tuangkan telur yang telah dipukul dan biarkan cepat masak. Letakkan dalam mangkuk dan taburkan dengan bonito flakes jika mahu."], "ko": ["돼지고기는 4~5cm 길이로 자른다. 고야는 세로 절반으로 자르고 숟가락으로 씨앗과 날을 잡고 5mm 폭으로 자른다. 소금으로 보고 5분 정도 놓고 흐르는 물로 씻어낸다. 두부는 물을 깎고 잘 먹기 쉬운 크기로 자른다. 계란은 녹는다.", "프라이팬에 참기름을 중화로 가열하고, 두부를 더해 구운 색이 붙도록 볶고, 고야, 돼지고기의 순서에 더해 볶는다.", "불이 지나면 생 간장으로 맛을 내고 녹은 계란을 흘려 넣고 살짝 불을 통과시킨다. 그릇에 담고 마음에 드는 가다랭이를 뿌린다."]}}, {"id": "0e387b0f", "source_url": "https://www.kikkoman.co.jp/homecook/search/recipe/00052743/", "source_site": "Kikkoman", "image": "https://images.weserv.nl/?url=https://www.kikkoman.co.jp/homecook/assets/img/00052743.jpg&w=600&output=jpg", "title": {"en": "Easy and raw! Classic pumpkin stew", "zh_tw": "簡單又原始！經典南瓜燉菜", "zh_cn": "简单又原始！经典南瓜炖菜", "vi": "Dễ dàng và thô! Món hầm bí ngô cổ điển", "hi": "आसान और कच्चा! क्लासिक कद्दू स्टू", "ru": "Легко и сыро! Классическое тыквенное рагу", "th": "ง่ายและดิบ! สตูว์ฟักทองคลาสสิก", "id": "Mudah dan mentah! Rebusan labu klasik", "ms": "Mudah dan mentah! Rebus labu klasik", "ko": "사보생으로 간단! 스테디셀러 호박 조림"}, "title_ja": "しぼ生で簡単！定番のかぼちゃの煮物", "desc": {"en": "", "zh_tw": "", "zh_cn": "", "vi": "", "hi": "", "ru": "", "th": "", "id": "", "ms": "", "ko": ""}, "desc_ja": "", "ingredients": [{"name_ja": "かぼちゃ", "amount": "300g", "translated": {"en": "pumpkin", "zh_tw": "南瓜", "zh_cn": "南瓜", "vi": "bí ngô", "hi": "कद्दू", "ru": "тыква", "th": "ฟักทอง", "id": "labu kuning", "ms": "labu", "ko": "호박"}, "amazon": "https://www.amazon.co.jp/s?k=%E3%81%8B%E3%81%BC%E3%81%A1%E3%82%83&tag=", "rakuten": "https://search.rakuten.co.jp/search/mall/%E3%81%8B%E3%81%BC%E3%81%A1%E3%82%83/?tag="}, {"name_ja": "キッコーマンいつでも新鮮しぼりたて生しょうゆ", "amount": "大さじ1と1/2", "translated": {"en": "Kikkoman always freshly squeezed raw soy sauce", "zh_tw": "龜甲萬總是鮮榨生醬油", "zh_cn": "龟甲万总是鲜榨生酱油", "vi": "Kikkoman luôn vắt nước tương tươi", "hi": "किक्कोमन हमेशा ताजा निचोड़ा हुआ कच्चा सोया सॉस", "ru": "Kikkoman всегда свежевыжатый сырой соевый соус", "th": "คิคโคแมนคั้นซีอิ๊วดิบสดใหม่อยู่เสมอ", "id": "Kikkoman selalu diperas dengan kecap mentah segar", "ms": "Kikkoman sentiasa baru diperah kicap mentah", "ko": "Kikoman 언제든지 신선한 갓 구운 생 간장"}, "amazon": "https://www.amazon.co.jp/s?k=%E3% //www.amazon.co.jp/s?k=%E6%B0%B4&tag=", "rakuten": "https://search.rakuten.co.jp/search/mall/%E6%B0%B4/?tag="}], "steps": {"en": ["Remove the seeds and pulp from the pumpkin, cut into bite-sized pieces, and peel off the skin.", "Arrange the pumpkins in a pot, add (A) and heat over high heat. Once it boils, reduce the heat to medium-low, cover with a lid, and simmer until the pumpkin is soft."], "zh_tw": ["從南瓜中取出種子和果肉，切成一口大小的塊，然後剝去皮。", "將南瓜放入鍋中，加入(A)，然後用大火加熱。一旦沸騰，將火調至中低，蓋上蓋子，小火煮至南瓜變軟。"], "zh_cn": ["从南瓜中取出种子和果肉，切成一口大小的块，然后剥去皮。", "将南瓜放入锅中，加入(A)，然后用大火加热。一旦沸腾，将火调至中低，盖上盖子，小火煮至南瓜变软。"], "vi": ["Loại bỏ hạt và cùi từ bí ngô, cắt thành miếng vừa ăn và gọt vỏ.", "Xếp bí ngô vào nồi, thêm (A) và đun trên lửa cao. Sau khi sôi, giảm nhiệt xuống mức vừa phải, đậy nắp và đun nhỏ lửa cho đến khi bí ngô mềm."], "hi": ["कद्दू से बीज और गूदा हटा दें, छोटे टुकड़ों में काट लें और छिलका उतार दें।", "कद्दू को एक बर्तन में व्यवस्थित करें, (ए) डालें और तेज़ आंच पर गर्म करें। एक बार जब यह उबल जाए, तो आंच को मध्यम-धीमी कर दें, ढक्कन से ढक दें और कद्दू के नरम होने तक धीमी आंच पर पकाएं।"], "ru": ["Удалить из тыквы семена и мякоть, нарезать небольшими кусочками и очистить от кожицы.", "Разложите тыквы в кастрюлю, добавьте (А) и нагрейте на сильном огне. Как только закипит, уменьшите огонь до среднего, накройте крышкой и варите, пока тыква не станет мягкой."], "th": ["นำเมล็ดและเนื้อออกจากฟักทอง หั่นเป็นชิ้นขนาดพอดีคำ แล้วลอกเปลือกออก", "จัดฟักทองลงในหม้อ ใส่ (A) แล้วตั้งไฟให้ร้อน เมื่อเดือดแล้ว ลดไฟลงเหลือไฟปานกลาง ปิดฝา และเคี่ยวจนฟักทองนิ่ม"], "id": ["Buang biji dan ampas labu, potong-potong seukuran gigitan, dan kupas kulitnya.", "Susun labu kuning dalam panci, tambahkan (A) dan panaskan dengan api besar. Setelah mendidih, kecilkan api menjadi sedang-kecil, tutup, dan biarkan mendidih hingga labu empuk."], "ms": ["Keluarkan biji dan pulpa dari labu, potong menjadi kepingan bersaiz gigitan, dan kupas kulitnya.", "Susun labu dalam periuk, masukkan (A) dan panaskan dengan api besar. Setelah mendidih, kecilkan api ke sederhana rendah, tutup dengan tudung, dan renehkan sehingga labu lembut."], "ko": ["호박은 씨와 와타를 없애고 한 입으로 썰어 곳곳에 껍질을 벗긴다.", "냄비에 호박을 늘어놓고, (A)를 넣고 강한 불에 걸고, 끓으면 약한 중불로 해 튀김을 하고, 호박이 부드러워질 때까지 끓인다."]}}, {"id": "fcad7294", "source_url": "https://www.kikkoman.co.jp/homecook/search/recipe/00003834/", "source_site": "Kikkoman", "image": "https://images.weserv.nl/?url=https://www.kikkoman.co.jp/homecook/assets/img/00003834.jpg&w=600&output=jpg", "title": {"en": "Boiled dried daikon radish [Popular standard Japanese dish]", "zh_tw": "水煮蘿蔔乾【人氣標準日本料理】", "zh_cn": "水煮萝卜干【人气标准日本料理】", "vi": "Củ cải khô luộc [Món ăn phổ biến theo tiêu chuẩn Nhật Bản]", "hi": "उबली हुई सूखी डेकोन मूली [लोकप्रिय मानक जापानी व्यंजन]", "ru": "Вареный сушеный редис дайкон [популярное стандартное японское блюдо]", "th": "หัวไชเท้าไดคงแห้งต้มสุก [อาหารญี่ปุ่นมาตรฐานยอดนิยม]", "id": "Lobak daikon kering rebus [Hidangan standar Jepang populer]", "ms": "Lobak daikon kering rebus [Hidangan Jepun standard popular]", "ko": "썰어 무의 조림 【인기의 단골 일식】"}, "title_ja": "切り干し大根の煮物【人気の定番和食】", "desc": {"en": "", "zh_tw": "", "zh_cn": "", "vi": "", "hi": "", "ru": "", "th": "", "id": "", "ms": "", "ko": ""}, "desc_ja": "", "ingredients": [{"name_ja": "切り干し大根（乾）", "amount": "30g", "translated": {"en": "Kiriboshi radish (dried)", "zh_tw": "切星蘿蔔（乾）", "zh_cn": "切星萝卜（干）", "vi": "Củ cải Kiriboshi (khô)", "hi": "किरिबोशी मूली (सूखी)", "ru": "Редис Кирибоши (сушеный)", "th": "หัวไชเท้าคิริโบชิ (แห้ง)", "id": "Lobak kiriboshi (kering)", "ms": "Lobak Kiriboshi (kering)", "ko": "잘라낸 무(건)"}, "amazon": "https://www.amazon.co.jp/s?k=%E5%88%87%E3%82%8A%E5%B9%B2%E3%81%97%E5%A4%A7%E6%A0%B9%EF%BC%88%E4%B9%BE%EF%BC%89&tag=", "rakuten": "https://search.rakuten.co.jp/search/mall/%E5%88%87%E3%82%8A%E5%B9%B2%E3%81%97%E5%A4%A7%E6%A0%B9%EF%BC%88%E4%B9%BE%EF%BC%89/?tag="}, {"name_ja": "油揚げ", "amount": "1枚", "translated": {"en": "fried tofu", "zh_tw": "炸豆腐", "zh_cn": "炸豆腐", "vi": "đậu phụ chiên", "hi": "तला हुआ टोफू", "ru": "жар s. Peel the carrots and cut them into thick slices.", "Heat oil in a pot over medium heat, add (1) and fry until coated with oil, then add (A) and bring to a boil. Reduce heat to low and simmer for about 10 minutes until the liquid has reduced."], "zh_tw": ["將切乾蘿蔔洗淨，用水浸泡，切成一口大小的塊狀。將炸好的豆腐縱向切成兩半，然後切成條狀。將紅蘿蔔去皮，切成厚片。", "鍋中以中火燒熱油，加入(1)炒至沾滿油，再加入(A)煮滾。將火調至小火，煮約 10 分鐘，直到液體減少。"], "zh_cn": ["将切干萝卜洗净，用水浸泡，切成一口大小的块。将炸好的豆腐纵向切成两半，然后切成条。将胡萝卜去皮，切成厚片。", "锅中以中火烧热油，加入(1)炒至沾满油，然后加入(A)煮滚。将火调至小火，煮约 10 分钟，直至液体减少。"], "vi": ["Củ cải kiriboshi daikon rửa sạch, ngâm nước rồi cắt thành miếng vừa ăn. Cắt đậu phụ chiên làm đôi theo chiều dọc và cắt thành dải. Gọt vỏ cà rốt và cắt thành lát dày.", "Đun nóng dầu trong nồi trên lửa vừa, cho (1) vào và chiên cho đến khi ngập dầu, sau đó cho (A) vào và đun sôi. Giảm nhiệt xuống thấp và đun nhỏ lửa trong khoảng 10 phút cho đến khi chất lỏng giảm bớt."], "hi": ["किरिबोशी डेकोन मूली को धोएं, पानी में भिगोएँ और छोटे टुकड़ों में काट लें। तले हुए टोफू को लंबाई में आधा काट लें और स्ट्रिप्स में काट लें। गाजर को छीलकर मोटे टुकड़ों में काट लीजिए.", "मध्यम आंच पर एक बर्तन में तेल गर्म करें, उसमें (1) डालें और तेल की परत चढ़ने तक भूनें, फिर (ए) डालें और उबाल लें। आंच धीमी कर दें और लगभग 10 मिनट तक धीमी आंच पर पकाएं जब तक कि तरल पदार्थ कम न हो जाए।"], "ru": ["Редис кирибоши дайкон вымойте, замочите в воде и нарежьте небольшими кусочками. Обжаренный тофу разрежьте вдоль пополам и нарежьте полосками. Очистите морковь и нарежьте ее толстыми ломтиками.", "Нагрейте масло в кастрюле на среднем огне, добавьте (1) и обжарьте, пока оно не покроется маслом, затем добавьте (А) и доведите до кипения. Уменьшите огонь до минимума и варите около 10 минут, пока жидкость не выпарится."], "th": ["ล้างหัวไชเท้าคิริโบชิ ไชเท้า แช่น้ำ แล้วหั่นเป็นชิ้นขนาดพอดีคำ เต้าหู้ทอดผ่าครึ่งตามยาวแล้วหั่นเป็นเส้น ปอกแครอทแล้วหั่นเป็นชิ้นหนา", "ตั้งน้ำมันในหม้อบนไฟร้อนปานกลาง ใส่ (1) และทอดจนเคลือบด้วยน้ำมัน จากนั้นเติม (A) แล้วนำไปต้ม ลดความร้อนลงและเคี่ยวประมาณ 10 นาทีจนของเหลวลดลง"], "id": ["Cuci lobak kiriboshi daikon, rendam dalam air, dan potong kecil-kecil. Potong tahu goreng menjadi dua memanjang dan potong-potong. Kupas wortel dan potong menjadi irisan tebal.", "Panaskan minyak dalam panci dengan api sedang, masukkan (1) dan goreng hingga terlapisi minyak, lalu tambahkan (A) dan didihkan. Kecilkan api menjadi rendah dan biarkan mendidih selama sekitar 10 menit sampai cairannya berkurang."], "ms": ["Basuh lobak kiriboshi daikon, rendam dalam air, dan potong seukuran gigitan. Potong tauhu goreng separuh memanjang dan potong jalur. Kupas lobak merah dan potong menjadi kepingan tebal.", "Panaskan minyak dalam periuk dengan api sederhana, masukkan (1) dan goreng hingga bersalut minyak, kemudian masukkan (A) dan biarkan mendidih. Kecilkan api dan reneh selama kira-kira 10 minit sehingga cecair berkurangan."], "ko": ["말린 무는 가볍게 씻은 다음 물로 끓여 먹기 쉽게 자른다. 기름 튀김은 세로 절반으로 자르고 스트립 자른다. 당근은 껍질을 벗기고 굵은 전단으로 만든다.", "냄비에 기름을 넣고 중불로 가열하고 (1)을 넣고 기름이 튀어 나올 때까지 볶고 (A)를 넣고 끓인다. 약한 불로 해서 국물이 적어질 때까지 10분 정도 끓인다."]}}, {"id": "3861fe65", "source_url": "https://www.kikkoman.co.jp/homecook/search/recipe/00052744/", "source_site": "Kikkoman", "image": "https://images.weserv.nl/?url=https://www.kikkoman.co.jp/homecook/assets/img/00052744.jpg&w=600&output=jpg", "title": {"en": "Easy and raw! Spicy fried rice with green onions and eggs", "zh_tw": "簡單又原始！香辣蔥蛋炒飯", "zh_cn": "简单又原始！香辣葱鸡蛋炒饭", "vi": "Dễ dàng và thô! Cơm chiên cay hành lá và trứng", "hi": "आसान और कच्चा! हरी प्याज और अंडे के साथ मसालेदार तले हुए चावल", "ru": "Легко и сыро! Острый жареный рис с зеленым луком и яйцами", "th": "ง่ายและดิบ! ข้าวผัดเผ็ดกับหัวหอมและไข่", "id": "Mudah dan mentah! Nasi goreng pedas dengan daun bawang dan telur", "ms": "Mudah dan mentah! Nasi goreng berempah dengan bawang hijau dan telur", "ko": "사보생으로 간단! 파와 계란의 고소한 볶음밥"}, "title_ja": "しぼ生で簡単！ねぎと卵の香ばし炒飯", "desc": {"en": "", "zh_tw": "", "zh_cn": "", "vi": "", "hi": "", "ru": "", "th": "", "id": "", "ms": "", "ko": ""}, "desc_ja": "", "ingredient cap mentah", "ko": "Kikoman 언제든지 신선한 갓 구운 생 간장"}, "amazon": "https://www.amazon.co.jp/s?k=%E3%82%AD%E3%83%83%E3%82%B3%E3%83%BC%E3%83%9E%E3%83%B3%E3%81%84%E3%81%A4%E3%81%A7%E3%82%82%E6%96%B0%E9%AE%AE%E3%81%97%E3%81%BC%E3%82%8A%E3%81%9F%E3%81%A6%E7%94%9F%E3%81%97%E3%82%87%E3%81%86%E3%82%86&tag=", "rakuten": "https://search.rakuten.co.jp/search/mall/%E3%82%AD%E3%83%83%E3%82%B3%E3%83%BC%E3%83%9E%E3%83%B3%E3%81%84%E3%81%A4%E3%81%A7%E3%82%82%E6%96%B0%E9%AE%AE%E3%81%97%E3%81%BC%E3%82%8A%E3%81%9F%E3%81%A6%E7%94%9F%E3%81%97%E3%82%87%E3%81%86%E3%82%86/?tag="}, {"name_ja": "こしょう", "amount": "少々", "translated": {"en": "pepper", "zh_tw": "胡椒", "zh_cn": "胡椒", "vi": "hạt tiêu", "hi": "काली मिर्च", "ru": "перец", "th": "พริกไทย", "id": "merica", "ms": "lada", "ko": "코쇼"}, "amazon": "https://www.amazon.co.jp/s?k=%E3%81%93%E3%81%97%E3%82%87%E3%81%86&tag=", "rakuten": "https://search.rakuten.co.jp/search/mall/%E3%81%93%E3%81%97%E3%82%87%E3%81%86/?tag="}, {"name_ja": "ごま油", "amount": "大さじ1/2", "translated": {"en": "sesame oil", "zh_tw": "香油", "zh_cn": "香油", "vi": "dầu mè", "hi": "तिल का तेल", "ru": "кунжутное масло", "th": "น้ำมันงา", "id": "minyak wijen", "ms": "minyak bijan", "ko": "참기름"}, "amazon": "https://www.amazon.co.jp/s?k=%E3%81%94%E3%81%BE%E6%B2%B9&tag=", "rakuten": "https://search.rakuten.co.jp/search/mall/%E3%81%94%E3%81%BE%E6%B2%B9/?tag="}], "steps": {"en": ["Roughly chop the green onions. Beat the eggs.", "Heat oil in a frying pan over medium heat, add green onions and fry. When it starts to brown, add the beaten egg and rice in that order and stir-fry.", "Turn the heat up to high, pour in the soy sauce from the bottom of the pot, stir-fry, sprinkle with pepper, add the sesame oil, mix, and serve in a bowl."], "zh_tw": ["將蔥大致切碎。打雞蛋。", "在煎鍋中以中火加熱油，加入蔥，炒。當它開始變褐色時，按順序加入打散的雞蛋和米飯，翻炒。", "將火調至大火，倒入鍋底的醬油，翻炒，撒上胡椒粉，加入香油，拌勻，盛入碗中。"], "zh_cn": ["将葱大致切碎。打鸡蛋。", "在煎锅中用中火加热油，加入葱，炒。当它开始变褐色时，按顺序加入打散的鸡蛋和米饭，翻炒。", "将火调至大火，倒入锅底的酱油，翻炒，撒上胡椒粉，加入香油，拌匀，盛入碗中。"], "vi": ["Cắt nhỏ hành lá. Đánh trứng.", "Đun nóng dầu trong chảo trên lửa vừa, cho hành lá vào xào. Khi nó bắt đầu chuyển sang màu nâu, thêm trứng và cơm đã đánh vào theo thứ tự đó rồi xào.", "Vặn lửa lớn, đổ nước tương từ đáy nồi vào, xào, rắc hạt tiêu, thêm dầu mè vào, trộn đều rồi cho ra bát."], "hi": ["हरे प्याज को मोटा-मोटा काट लें. अंडे मारो.", "- मध्यम आंच पर एक कड़ाही में तेल गर्म करें, उसमें हरा प्याज डालकर भूनें. जब यह भूरा होने लगे तो इसमें फेंटा हुआ अंडा और चावल उसी क्रम में डालें और चलाते हुए भूनें।", "आँच को तेज़ कर दें, बर्तन के नीचे से सोया सॉस डालें, हिलाएँ-तलें, काली मिर्च छिड़कें, तिल का तेल डालें, मिलाएँ और एक कटोरे में परोसें।"], "ru": ["Крупно нарезаем зеленый лук. Взбейте яйца.", "Нагрейте масло в сковороде на среднем огне, добавьте зеленый лук и обжарьте. Когда он начнет подрумяниваться, добавьте взбитое яйцо и рис в указанном порядке и обжарьте, помешивая.", "Увеличьте огонь, влейте со дна кастрюли соевый соус, обжарьте, посыпьте перцем, добавьте кунжутное масло, перемешайте и подавайте в миске."], "th": ["สับหัวหอมสีเขียวอย่างหยาบ ตีไข่.", "ตั้งน้ำมันในกระทะบนไฟร้อนปานกลาง ใส่หัวหอมสีเขียวแล้วทอด เมื่อเริ่มเป็นสีน้ำตาล ให้ใส่ไข่ที่ตีแล้วและข้าวตามลำดับแล้วผัด", "เพิ่มไฟให้สูง เทซีอิ๊วจากก้นหม้อลงไป ผัด โรยด้วยพริกไทย ใส่น้ำมันงา ผสมและเสิร์ฟในชาม"], "id": ["Cincang kasar daun bawang. Kocok telurnya.", "Panaskan minyak dalam wajan dengan api sedang, tambahkan daun bawang dan goreng. Jika sudah mulai berwarna kecokelatan, tambahkan telur kocok dan nasi secara berurutan, lalu tumis.", "Besarkan api, tuang kecap asin dari dasar panci, tumis, taburi merica, tambahkan minyak wijen, aduk, dan sajikan dalam mangkuk."], "ms": ["Potong kasar bawang hijau. Pukul telur.", "Panaskan minyak dalam kuali dengan api sederhana, masukkan bawang hijau dan goreng. Apabila ia mula keperangan, masukkan telur dan nasi yang telah dipukul mengikut urutan tersebut dan tumis.", "Besarkan api, tuangkan kicap dari bawah periuk, tumis, taburkan lada, masukkan minyak bijan, gaul dan hidangkan dalam mangkuk."], "ko": ["파는 거칠게 썬다. 계란은 녹아 둔다.", "프라이팬에 기름을 넣고 중불로 가열하고 파를 넣고 볶는다. 구운 색이 붙으면 녹은 달걀, 밥의 순서에 더해 볶는다.", "강불로 하고 냄비 피부에서 간장을 돌려 넣어 볶아, 후추를 닦고 참기름을 넣고, 섞어 그릇에 담는다."]}}, {"id": "75508eeb", "source_url": "https://www.kikkoman.co.jp/homecook/search/recipe/00004703/", "source_site": "Kikkoman", "image": "https://images.weserv.nl/?url=https://www.kikkoman.co.jp/homecook/assets/img/00004703.jpg&w=600&output=jpg", "title": {"en": "Oyakodon (popular classic flavor with soy sauce, mirin, and sugar)", "zh_tw": "親子丼（配上醬油、味醂和糖的經典經典口味）", "zh_cn": "亲子丼（配以酱油、味醂和糖的经典经典口味）", "vi": "Oyakodon (hương vị cổ điển phổ biến với nước tương, mirin và đường)", "hi": "ओयाकोडोन (सोया सॉस, मिरिन और चीनी के साथ लोकप्रिय क्लासिक स्वाद)", "ru": "Оякодон (популярный классический вкус с соевым соусом, мирином и сахаром)", "th": "โอยาโกะด้ง (รสคลาสสิกยอดนิยมพร้อมซีอิ๊ว มิริน และน้ำตาล)", "id": "Oyakodon (rasa klasik populer dengan kecap, mirin, dan gula)", "ms": "Oyakodon (rasa klasik yang popular dengan kicap, mirin dan gula)", "ko": "부모와 자식 그릇 【간장과 미림과 설탕으로 인기의 스테디셀러 맛】"}, "title_ja": "親子丼【しょうゆとみりんと砂糖で人気の定番味】", "desc": {"en": "", "zh_tw": "", "zh_cn": "", "vi": "", "hi": "", "ru": "", "th": "", "id": "", "ms": "", "ko": ""}, "desc_ja": "", "ingredients": [{"name_ja": "鶏もも肉", "amount": "1/2枚", "translated": {"en": "chicken thigh", "zh_tw": "雞大腿", "zh_cn": "鸡大腿", "vi": "đùi gà", "hi": "चिकन थाई", "ru": "куриное бедро", "th": "ต้นขาไก่", "id": "paha ayam", "ms": "paha ayam", "ko": "닭 허벅지 고기"}, "amazon": "https://www.amazon.co.jp/s?k=%E9%B6%8F%E3%82%82%E3%82%82%E8%82%89&tag=", "rakuten": "https://search.rakuten.co.jp/search/mall/%E9%B6%8F%E3%82%82%E3%82%82%E8%82%89/?tag="}, {"name_ja": "玉ねぎ", "amount": "1/2個", "translated": {"en": "onion", "zh_tw": "洋蔥", "zh_cn": "洋葱", "vi": "củ hành", "hi": "प्याज", "ru": "лук", "th": "หัวหอม", "id": "bawang bombai", "ms": "bawang besar", "ko": "양파"}, "amazon": "https://www.amazon.co.jp/s?k=%E7%8E%89%E3%81%AD%E3%81%8E&tag=", "rakuten": "https://search.rakuten.co.jp/search/m ."], "ms": ["Toskan beras dan toskan dalam colander. Keluarkan tulang dari salmon mentah, rendam dalam sake selama kira-kira 5 minit, dan lap airnya. Bahagikan cendawan maitake kepada tandan kecil. Potong akar teratai dan lobak merah menjadi kepingan setebal 3mm. Potong daun mitsuba menjadi 2cm panjang.", "Masukkan beras dan (A) ke dalam periuk nasi, masukkan air ke tanda 2 cawan, gaul rata, kemudian atas dengan salmon mentah, cendawan maitake, akar teratai, dan lobak merah dan masak.", "Bila salmon dah masak, keluarkan, buang kulit dan tulang, longgarkan salmon, masukkan semula ke dalam periuk nasi, dan gaul rata.", "Letakkan dalam mangkuk dan taburkan daun mitsuba."], "ko": ["쌀은 굳이 들려 준다. 생연어는 뼈를 제거하고 술에 5분 정도 담그고 물기를 닦아낸다. 마이타케는 소방으로 나눈다. 벽돌, 당근은 3mm 두께의 찢어진다. 세 잎은 2cm 길이로 자른다.", "밥솥에 쌀과 (A)를 넣고 2합의 눈금까지 물을 넣고 푹 섞어 생연어, 볶음밥, 연근, 당근을 얹어 밥솥한다.", "밥솥이 나면 연어를 꺼내 껍질, 뼈를 벗고 몸을 풀어 밥솥에 넣어 깔끔하게 섞는다.", "그릇에 담아 세 잎을 깜박입니다."]}}];

const PER_PAGE = 10;
let currentLang = 'en';
let currentPage = 1;
let filtered = RECIPES;

// ── 言語切替 ──
function setLang(lang) {
  currentLang = lang;
  document.querySelector('.lang-select').value = lang;
  document.getElementById('search-input').placeholder = (SEC[lang]||SEC['en']).search_placeholder;
  document.querySelector('.back-btn').textContent = (SEC[lang]||SEC['en']).back;
  renderList();
}

// ── 検索 ──
function onSearch() {
  const q = document.getElementById('search-input').value.toLowerCase();
  filtered = q ? RECIPES.filter(r => {
    const t = (r.title[currentLang]||r.title_ja||'').toLowerCase();
    return t.includes(q);
  }) : RECIPES;
  currentPage = 1;
  renderList();
}

// ── 一覧表示 ──
function showList() {
  document.getElementById('list-view').style.display = '';
  document.getElementById('detail-view').style.display = 'none';
  renderList();
}

function renderList() {
  const grid = document.getElementById('recipe-grid');
  const total = filtered.length;
  const pages = Math.ceil(total / PER_PAGE);
  const start = (currentPage - 1) * PER_PAGE;
  const slice = filtered.slice(start, start + PER_PAGE);

  grid.innerHTML = slice.map(r => {
    const title = r.title[currentLang] || r.title_ja;
    const imgHtml = r.image
      ? `<img src="${r.image}" alt="${title}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=no-img>🍽️</div>'">`
      : `<div class="no-img">🍽️</div>`;
    return `<div class="recipe-thumb" onclick="showDetail('${r.id}')">
      ${imgHtml}
      <div class="thumb-body">
        <div class="thumb-title">${title}</div>
        <div class="thumb-site">${r.source_site}</div>
      </div>
    </div>`;
  }).join('');

  // ページネーション
  const pag = document.getElementById('pagination');
  if (pages <= 1) { pag.innerHTML = ''; return; }
  const s = SEC[currentLang]||SEC['en'];
  pag.innerHTML = Array.from({length: pages}, (_, i) =>
    `<button class="page-btn${i+1===currentPage?' active':''}" onclick="goPage(${i+1})">${s.page} ${i+1}</button>`
  ).join('');
}

function goPage(p) {
  currentPage = p;
  renderList();
  window.scrollTo(0,0);
}

// ── 詳細表示 ──

  const ingGrid = document.getElementById('d-ing-grid');
  ingGrid.innerHTML = r.ingredients.map(ing => {
    const name = (ing.translated&&ing.translated[lang]) || ing.name_ja;
    const aff = [
      ing.amazon  ? `<a class="aff-link amz" href="${ing.amazon}"  target="_blank" rel="nofollow">Amazon</a>` : '',
      ing.rakuten ? `<a class="aff-link rkt" href="${ing.rakuten}" target="_blank" rel="nofollow">楽天</a>`   : '',
    ].join('');
    return `<div class="ing">
      <span class="amt">${ing.amount}</span>
      <span>${name}</span>
      ${aff ? `<div class="aff-row">${aff}</div>` : ''}
    </div>`;
  }).join('');

  // 手順
  const stepsList = r.steps[lang] || r.steps['en'] || [];
  document.getElementById('d-steps-list').innerHTML = stepsList.map(s => `<li>${s}</li>`).join('');

  document.getElementById('list-view').style.display   = 'none';
  document.getElementById('detail-view').style.display = '';
  window.scrollTo(0,0);
}
