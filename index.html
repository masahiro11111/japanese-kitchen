anslated": {"en": "With the concept of making delicious food properly,", "zh_tw": "以正確製作美味的概念，", "zh_cn": "以正确制作美味的理念，", "vi": "Với quan niệm làm món ăn ngon đúng cách,", "hi": "स्वादिष्ट भोजन ठीक से बनाने की अवधारणा के साथ,", "ru": "С концепцией правильного приготовления вкусной еды,", "th": "ด้วยแนวคิดในการทำอาหารอร่อยอย่างถูกต้อง", "id": "Dengan konsep membuat makanan lezat dengan benar,", "ms": "Dengan konsep membuat makanan yang sedap dengan betul,", "ko": "제대로 맛있게 만들 수 있는 컨셉으로,"}, "amazon": "https://www.amazon.co.jp/s?k=%E3%81%8D%E3%81%A1%E3%82%93%E3%81%A8%E3%81%8A%E3%81%84%E3%81%97%E3%81%8F%E4%BD%9C%E3%82%8C%E3%82%8B%E3%82%92%E3%82%B3%E3%83%B3%E3%82%BB%E3%83%97%E3%83%88%E3%81%AB%E3%80%81&tag=", "rakuten": "https://search.rakuten.co.jp/search/mall/%E3%81%8D%E3%81%A1%E3%82%93%E3%81%A8%E3%81%8A%E3%81%84%E3%81%97%E3%81%8F%E4%BD%9C%E3%82%8C%E3%82%8B%E3%82%92%E3%82%B3%E3%83%B3%E3%82%BB%E3%83%97%E3%83%88%E3%81%AB%E3%80%81/?tag="}], "steps": {"en": ["Preparation: Coarsely chop the sweet chocolate and mixed nuts. Put the dried fruit mix and rum in a bowl and leave to soak overnight. Bring cream cheese back to room temperature.", "① [Rice koji milk cassata] Mix rice koji milk and cream cheese with a rubber spatula.", "② [Whipped cream] In a separate bowl, put fresh cream and granulated sugar (4g) and whip with a hand mixer for 7 minutes (until it is soft enough to leave streaks when lifted).", "③ [Meringue] Put the egg whites in a separate bowl and whisk with a hand mixer until about half of the liquid becomes foamy. Add granulated sugar (20g) in three parts, stirring each time until it forms stiff peaks when lifted.", "④ Add whipped cream to ① and mix, then add meringue and mix further.", "⑤ Add chopped mixed nuts, sweet chocolate, and dried fruit mix to ④ and mix. Pour into a vat lined with plastic wrap, cover with plastic wrap and chill in the freezer overnight.", "⑥ [Chocolate Daifuku] Combine dango flour, granulated sugar, and cocoa powder and sift through a sieve.", "⑦Put shiratamako and water in a pot and mix. Add starch syrup and rice koji milk and mix with a rubber spatula until combined. Add ⑥ and mix until blended.", "⑧ Heat over medium heat and turn the mixture until it comes together like a rice cake.", "⑨ Sift cocoa powder onto a wrapped bat and place the dough on top. Sprinkle a little cocoa powder on top of the dough, cover with plastic wrap, and smooth it out (daifuku mochi). Cut the daifuku mochi into 5 equal pieces and place on a cookie sheet sprinkled with cocoa powder. Sprinkle with cocoa powder, place parchment paper between the two, and roll out with a rolling pin to a diameter of about 15cm.", "⑩Pour 1/5 of the roughly crushed coffee jelly into a bowl, spread the rice koji milk cassata on top, and squeeze whipped cream around the cassata.", "⑪Cover the rolled-out Daifuku mochi into a round ice cream, shape it, and place it on top of the cassata. Decorate the daifuku with cut strawberries and squeeze whipped cream onto the daifuku."], "zh_tw": ["準備工作：將甜巧克力和混合堅果粗切碎。將乾果混合物和蘭姆酒放入碗中，浸泡過夜。將奶油乳酪恢復至室溫。", "① [米曲牛奶卡薩塔] 用橡皮刮刀將米曲牛奶和奶油乳酪混合。", "②【鮮奶油】在另一碗中放入鮮奶油和砂糖（4克），用手持式攪拌機攪打7分鐘（直至打發時軟到留下條紋）。", "③ 【蛋白霜】將蛋白放入另一個碗中，用手動攪拌機攪拌至約一半的液體變成泡沫狀。分三份加入砂糖（20克），每次攪拌至提起時形成硬性發泡。", "④ 將鮮奶油加入①中，攪拌均勻，然後加入蛋白霜，攪拌均勻。", "⑤ 將切碎的混合堅果、甜巧克力和乾果混合物加入 ④ 並混合。倒入鋪有保鮮膜的大桶中，蓋上保鮮膜，放入冰箱冷藏過夜。", "⑥ [巧克力大福] 將團子粉、砂糖、可可粉混合，過篩。", "⑦將白玉子和水放入鍋中攪拌。加入澱粉糖漿和米曲奶，用橡皮刮刀攪拌至混合。加入 ⑥ 並混合直至混合。", "⑧ 以中火加熱並翻動混合物，直到其像年糕一樣黏在一起。", "⑨ 將可可粉篩入包好的球棒上，然後將麵團放在上面。在麵團上撒上少許可粉，蓋上保鮮膜，然後將其弄平（大福麻糬）。將大福麻糬切成 5 等份，放在撒有可可粉的烤盤上。撒上可可粉，將羊皮紙放在兩者之間，用擀麵杖擀成直徑約15公分的面。", "⑩將1/5大致粉碎的咖啡果凍倒入碗中，在上面鋪上米曲牛奶卡薩塔，並在卡薩塔周圍擠上鮮奶油。", "⑪將捲好的大福麻糬包在圓形冰淇淋上，塑造形狀，放在卡薩塔上。用切好的草莓裝飾大福，然後將鮮奶油擠在大福上。"], "zh_cn": ["准备工作：将甜巧克力和混合坚果粗切碎。将干果混合物和朗姆酒放入碗中，浸泡过夜。将奶油奶酪恢复至室温。", "① [米曲牛奶卡萨塔] 用橡皮刮刀将米曲牛奶和奶油奶酪混合。", "②【淡奶油】在另一个碗中放入鲜奶油和砂糖（4克），用手持式搅拌机搅打7分钟（直至打发时软到留下条纹）。", "③ 【蛋白酥皮】将蛋白放入另一个碗中，用手动搅拌机搅拌至约一半的液体变成泡沫状。分三份加入砂糖（20克），每次搅拌直至提起时形成硬性发泡。", "④ 将淡奶油加入①中，搅拌均匀，然后加入蛋白霜，搅拌均匀。", "⑤ 将切碎的混合坚果、甜巧克力和干果混合物加入到 ④ 中并混合。倒入衬有保鲜膜的大桶中，盖上保鲜膜，放入冰箱冷藏过夜。", "⑥ [巧克力大福] 将团子粉、砂糖、可可粉混合，过筛。", "⑦将白玉子和水放入锅中搅拌。加入淀粉糖浆和米曲奶，用橡皮刮刀搅拌直至混合。添加 ⑥ 并混合直至混合。", "⑧ 用中火加热并翻动混合物，直至其像年糕一样粘在一起。", "⑨ 将可可粉筛入包好的球棒上，然后将面团放在上面。在面团上撒上少许可可粉，盖上保鲜膜，然后将其弄平（大福麻糬）。将大福麻糬切成 5 等份，放在撒有可可粉的烤盘上。撒上可可粉，将羊皮纸放在两者之间，用擀面杖擀成直径约15厘米的面。", "⑩将1/5大致粉碎的咖啡果冻倒入碗中，在上面铺上米曲牛奶卡萨塔，并在卡萨塔周围挤上鲜奶油。", "⑪将卷好的大福麻糬包在圆形冰淇淋上，塑造形状，放在卡萨塔上。用切好的草莓装饰大福，然后将鲜奶油挤在大福上。"], "vi": ["Chuẩn bị: Cắt nhỏ sô cô la ngọt và các loại hạt hỗn hợp. Cho hỗn hợp trái cây khô và rượu rum vào tô và ngâm qua đêm. Đưa phô mai kem về nhiệt độ phòng.", "① [Sữa gạo koji cassata] Trộn sữa gạo koji và phô mai kem bằng thìa cao su.", "② [Kem đánh bông] Trong một bát riêng, cho kem tươi và đường cát (4g) vào rồi dùng máy trộn cầm tay đánh trong 7 phút (cho đến khi mềm đủ để khi nhấc lên để lại vệt).", "③ [Meringue] Cho lòng trắng trứng vào tô riêng và dùng máy đánh trứng đánh đều cho đến khi khoảng một nửa lòng trắng nổi bọt. Cho đường cát (20g) làm ba phần, khuấy đều mỗi lần cho đến khi nhấc lên tạo thành chóp cứng.", "④ Thêm kem tươi vào ① và trộn, sau đó thêm meringue vào và trộn thêm.", "⑤ Thêm các loại hạt đã cắt nhỏ, sô-cô-la ngọt và hỗn hợp trái cây sấy khô vào ④ và trộn đều. Đổ vào thùng có lót màng bọc thực phẩm, đậy lại bằng màng bọc thực phẩm và để trong ngăn đá tủ lạnh qua đêm.", "⑥ [Sô cô la Daifuku] Trộn bột dango, đường cát và bột ca cao rồi rây qua rây.", "⑦Cho shiratamako và nước vào nồi rồi trộn đều. Thêm xi-rô tinh bột và sữa koji gạo và trộn bằng thìa cao su cho đến khi kết hợp. Thêm ⑥ và trộn cho đến khi hòa quyện.", "⑧ Đun nóng trên lửa vừa và đảo hỗn hợp cho đến khi nó quyện lại như bánh gạo.", "⑨ Rây bột ca cao lên một chiếc chày đã bọc sẵn rồi đặt bột lên trên. Rắc một ít bột ca cao lên trên mặt bột, dùng màng bọc thực phẩm bọc lại và dàn phẳng (daifuku mochi). Cắt daifuku mochi thành 5 miếng bằng nhau và đặt lên khay nướng có rắc bột ca cao. Rắc bột ca cao lên, lót giấy nến vào giữa hai miếng rồi dùng cán cán mỏng có đường kính khoảng 15cm.", "⑩Đổ 1/5 thạch cà phê đã nghiền nhuyễn vào tô, phết sữa gạo koji cassata lên trên và bóp kem xung quanh cassata.", "⑪ Bọc miếng bánh mochi Daifuku đã cuộn thành một viên kem tròn, tạo hình và đặt lên trên cassata. Trang trí daifuku bằng những quả dâu tây cắt nhỏ và bóp kem tươi lên daifuku."], "hi": ["तैयारी: मीठी चॉकलेट और मिश्रित मेवों को मोटा-मोटा काट लें। सूखे मेवों का मिश्रण और रम एक कटोरे में डालें और रात भर भीगने के लिए छोड़ दें। क्रीम चीज़ को वापस कमरे के तापमान पर लाएँ।", "① [चावल कोजी दूध कसाटा] चावल कोजी दूध और क्रीम चीज़ को रबर स्पैचुला से मिलाएं।", "② [व्हीप्ड क्रीम] एक अलग कटोरे में, ताजी क्रीम और दानेदार चीनी (4 ग्राम) डालें और हाथ के मिक्सर से 7 मिनट तक फेंटें (जब तक कि यह इतना नरम न हो जाए कि उठाने पर धारियाँ निकल जाए)।", "③ [मेरिंग्यू] अंडे की सफेदी को एक अलग कटोरे में डालें और हैंड मिक्सर से तब तक फेंटें जब तक कि लगभग आधा तरल झागदार न हो जाए। दानेदार चीनी (20 ग्राम) को तीन भागों में मिलाएं, हर बार हिलाते रहें जब तक कि उठाने पर यह कड़ी न हो जाए।", "④ में व्हीप्ड क्रीम डालें और मिलाएँ, फिर मेरिंग्यू डालें और और मिलाएँ।", "⑤ इसमें कटे हुए मिश्रित मेवे, मीठी चॉकलेट और सूखे मेवे का मिश्रण डालें और मिलाएँ। प्लास्टिक रैप से ढके एक बर्तन में डालें, प्लास्टिक रैप से ढकें और रात भर फ्रीजर में ठंडा करें।", "⑥ [चॉकलेट डाइफुकु] डेंगो आटा, दानेदार चीनी और कोको पाउडर को मिलाएं और एक छलनी से छान लें।", "⑦एक बर्तन में शिरतामाको और पानी डालकर मिला लें. स्टार्च सिरप और चावल कोजी दूध डालें और एक रबर स्पैटुला के साथ मिश्रित होने तक मिलाएँ। ⑥ जोड़ें और मिश्रित होने तक मिलाएँ।", "⑧ मध्यम आंच पर गर्म करें और मिश्रण को तब तक पलटें जब तक यह चावल के केक की तरह एक साथ न आ जाए।", "⑨ कोको पाउडर को लपेटे हुए बैट पर छान लें और ऊपर से आटा रखें। आटे के ऊपर थोड़ा सा कोको पाउडर छिड़कें, प्लास्टिक रैप से ढकें और चिकना कर लें (डाइफुकु मोची)। दाइफुकु मोची को 5 बराबर टुकड़ों में काटें और कोको पाउडर छिड़के हुए कुकी शीट पर रखें। कोको पाउडर छिड़कें, दोनों के बीच चर्मपत्र कागज रखें और बेलन की सहायता से लगभग 15 सेमी के व्यास में बेल लें।", "⑩एक कटोरे में मोटे तौर पर कुचली हुई कॉफी जेली का 1/5 भाग डालें, ऊपर चावल कोजी दूध कसाटा फैलाएं, और कसाटा के चारों ओर व्हीप्ड क्रीम निचोड़ें।", "⑪बेली हुई डाइफुकु मोची को गोल आइसक्रीम में ढकें, आकार दें और कसाटा के ऊपर रखें। दाइफुकु को कटी हुई स्ट्रॉबेरी से सजाएं और दाइफुकु पर व्हीप्ड क्रीम निचोड़ें।"], "ru": ["Приготовление: Крупно нарезать сладкий шоколад и смесь орехов. Положите смесь сухофруктов и ром в миску и оставьте на ночь. Доведите сливочный сыр до комнатной температуры.", "① [Кассата с рисовым молоком коджи] Смешайте рисовое молоко с коджи и сливочный сыр резиновой лопаточкой.", "② [Взбитые сливки] В отдельную миску положите свежие сливки и сахарный песок (4 г) и взбивайте ручным миксером в течение 7 минут (пока они не станут достаточно мягкими, чтобы при подъеме оставались полосы).", "③ [Меренга] Поместите яичные белки в отдельную миску и взбивайте ручным миксером, пока примерно половина жидкости не станет пенистой. Добавьте сахарный песок (20 г) тремя частями, каждый раз помешивая, пока при подъеме не образуются твердые пики.", "④ Добавьте взбитые сливки в ① и перемешайте, затем добавьте безе и продолжайте перемешивать.", "⑤ Добавьте измельченную смесь орехов, сладкого шоколада и сухофруктов в ④ и перемешайте. Вылейте в чан, застеленный полиэтиленовой пленкой, накройте полиэтиленовой пленкой и поставьте в морозильную камеру на ночь.", "⑥ [Шоколадный дайфуку] Смешайте муку данго, сахарный песок и какао-порошок и просейте через сито.", "⑦Положите ширатамако и воду в кастрюлю и перемешайте. Добавьте крахмальный сироп и рисовое молоко коджи и перемешайте резиновой лопаткой до однородной массы. Добавьте ⑥ и перемешайте до однородной массы.", "⑧ Нагрейте на среднем огне и переворачивайте смесь, пока она не станет однородной, как рисовый пирог.", "⑨ Просейте какао-порошок на обернутую летучую мышь и выложите сверху тесто. Посыпьте тесто сверху небольшим количеством какао-порошка, накройте полиэтиленовой пленкой и разровняйте (дайфуку моти). Разрежьте дайфуку моти на 5 равных частей и выложите на противень, посыпанный какао-порошком. Посыпьте какао-порошком, положите между ними пергаментную бумагу и раскатайте скалкой до диаметра около 15 см.", "⑩Вылейте 1/5 крупно измельченного кофейного желе в миску, сверху намажьте кассату с рисом и молоком коджи и выдавите вокруг кассаты взбитые сливки.", "⑪ Накройте раскатанный дайфуку моти круглым мороженым, придайте ему форму и поместите поверх кассаты. Украсьте дайфуку нарезанной клубникой и выдавите на дайфуку взбитые сливки."], "th": ["การเตรียม: สับช็อกโกแลตหวานและถั่วผสมอย่างหยาบ ใส่ผลไม้แห้งและเหล้ารัมลงในชามแล้วปล่อยทิ้งไว้ข้ามคืน นำครีมชีสกลับไปที่อุณหภูมิห้อง", "1. [คาสซาตานมโคจิข้าว] ผสมนมโคจิข้าวและครีมชีสด้วยไม้พายยาง", "② [วิปปิ้งครีม] ในชามแยก ใส่ครีมสดและน้ำตาลทราย (4g) แล้วตีด้วยเครื่องตีแบบมือถือเป็นเวลา 7 นาที (จนกว่าจะนิ่มพอที่จะทิ้งเส้นเมื่อยกขึ้น)", "3. [เมอแรงค์] ใส่ไข่ขาวลงในชามอีกใบแล้วตีด้วยเครื่องผสมมือจนของเหลวประมาณครึ่งหนึ่งกลายเป็นฟอง เติมน้ำตาลทราย (20 กรัม) ลงในสามส่วน คนให้เข้ากันในแต่ละครั้งจนตั้งยอดแข็งเมื่อยกขึ้น", "④ ใส่วิปครีมลงไป ① แล้วผสม จากนั้นเติมเมอแรงค์และผสมต่อไป", "⑤ ใส่ถั่วผสมสับ ช็อคโกแลตหวาน และผลไม้แห้งผสมลงใน ④ แล้วผสม เทลงในถังที่ปูด้วยพลาสติกแร็ป ปิดด้วยพลาสติกแร็ป แล้วแช่เย็นในช่องแช่แข็งข้ามคืน", "⑥ [ช็อกโกแลตไดฟูกุ] ผสมแป้งดังโงะ น้ำตาลทราย และผงโกโก้เข้าด้วยกัน แล้วร่อนผ่านตะแกรง", "⑦ใส่ชิราทามาโกะและน้ำลงในหม้อแล้วผสม เพิ่มน้ำเชื่อมแป้งและนมโคจิข้าวและผสมกับไม้พายยางจนเข้ากัน เพิ่ม ⑥ และผสมจนเข้ากัน", "⑧ ตั้งไฟปานกลางแล้วหมุนส่วนผสมจนเข้ากันเหมือนเค้กข้าว", "⑨ ร่อนผงโกโก้ลงบนไม้ตีที่ห่อแล้ววางแป้งไว้ด้านบน โรยผงโกโก้เล็กน้อยลงบนแป้ง คลุมด้วยพลาสติกแร็ป แล้วเกลี่ยให้เรียบ (ไดฟูกุโมจิ) หั่นไดฟูกุโมจิออกเป็น 5 ชิ้นเท่าๆ กัน แล้ววางบนแผ่นคุกกี้ที่โรยด้วยผงโกโก้ โรยด้วยผงโกโก้ วางกระดาษ parchment ไว้ระหว่างทั้งสอง และคลึงออกด้วยไม้นวดแป้งที่มีเส้นผ่านศูนย์กลางประมาณ 15 ซม.", "⑩เท 1/5 ของเยลลี่กาแฟที่บดหยาบๆ ลงในชาม เกลี่ยคาสซาตานมโคจิข้าวไว้ด้านบน แล้วบีบวิปครีมรอบๆ คาสซาตา", "⑪โรยโมจิ Daifuku ที่รีดแล้วลงในไอศกรีมทรงกลม แล้วปั้นเป็นรูปร่าง แล้ววางลงบนคาสซาตา ตกแต่งไดฟุกุด้วยสตรอเบอร์รี่ที่หั่นแล้ว และบีบวิปครีมลงบนไดฟูกุ"], "id": ["Persiapan: Cincang kasar coklat manis dan kacang campur. Masukkan campuran buah kering dan rum ke dalam mangkuk dan biarkan terendam semalaman. Bawa krim keju kembali ke suhu kamar.", "① [Rice koji milk cassata] Campur susu rice koji dan krim keju dengan spatula karet.", "② [Krim kocok] Dalam mangkuk terpisah, masukkan krim segar dan gula pasir (4g) dan kocok dengan hand mixer selama 7 menit (sampai cukup lembut sehingga meninggalkan goresan saat diangkat).", "③ [Meringue] Masukkan putih telur ke dalam mangkuk terpisah dan kocok dengan hand mixer hingga separuh cairannya berbusa. Tambahkan gula pasir (20g) dalam tiga bagian, aduk terus hingga membentuk puncak kaku saat diangkat.", "④ Tambahkan krim kocok ke ① dan aduk, lalu tambahkan meringue dan aduk lebih lanjut.", "⑤ Tambahkan kacang campur cincang, coklat manis, dan campuran buah kering ke dalam ④ dan aduk. Tuang ke dalam tong yang dialasi plastik wrap, tutup dengan plastik wrap dan dinginkan di freezer semalaman.", "⑥ [Cokelat Daifuku] Campurkan tepung dango, gula pasir, dan coklat bubuk, lalu saring.", "⑦Masukkan shiratamako dan air ke dalam panci, lalu aduk. Tambahkan sirup kanji dan susu beras koji lalu aduk dengan spatula karet hingga tercampur. Tambahkan ⑥ dan aduk hingga rata.", "⑧ Panaskan dengan api sedang dan balikkan adonan hingga menyatu seperti lontong.", "⑨ Ayak coklat bubuk ke dalam adonan yang sudah dibungkus dan letakkan adonan di atasnya. Taburkan sedikit coklat bubuk di atas adonan, tutup dengan plastik wrap, dan ratakan (daifuku mochi). Potong daifuku mochi menjadi 5 bagian sama besar dan letakkan di atas loyang yang ditaburi coklat bubuk. Taburi dengan coklat bubuk, letakkan kertas roti di antara keduanya, lalu gulung dengan rolling pin hingga diameter sekitar 15cm.", "⑩Tuang 1/5 jeli kopi yang sudah dihaluskan kasar ke dalam mangkuk, oleskan cassata susu koji beras di atasnya, dan peras krim kocok di sekitar cassata.", "⑪Tutup Daifuku mochi yang sudah digulung ke dalam es krim bulat, bentuk, dan letakkan di atas cassata. Hiasi daifuku dengan potongan stroberi dan peras krim kocok ke atas daifuku."], "ms": ["Penyediaan: Cincang kasar coklat manis dan kacang campuran. Masukkan campuran buah kering dan rum ke dalam mangkuk dan biarkan meresap semalaman. Bawa krim keju kembali ke suhu bilik.", "① [Rice koji milk cassata] Campurkan susu koji beras dan keju krim dengan spatula getah.", "② [Krim putar] Dalam mangkuk yang berasingan, masukkan krim segar dan gula pasir (4g) dan pukul dengan pengadun tangan selama 7 minit (sehingga ia cukup lembut untuk meninggalkan kesan apabila diangkat).", "③ [Meringue] Masukkan putih telur ke dalam mangkuk yang berasingan dan pukul dengan pengadun tangan sehingga separuh daripada cecair menjadi berbuih. Masukkan gula pasir (20g) dalam tiga bahagian, kacau setiap kali sehingga ia membentuk puncak kaku apabila diangkat.", "④ Masukkan krim putar kepada ① dan gaul, kemudian masukkan meringue dan gaul lagi.", "⑤ Masukkan kacang campuran cincang, coklat manis dan campuran buah-buahan kering ke ④ dan gaul. Tuangkan ke dalam tong yang dialas dengan bungkus plastik, tutup dengan bungkus plastik dan sejukkan di dalam peti sejuk semalaman.", "⑥ [Coklat Daifuku] Satukan tepung dango, gula pasir, dan serbuk koko dan ayakan melalui ayak.", "⑦Masukkan shiratamako dan air dalam periuk dan gaul. Masukkan sirap kanji dan susu koji beras dan gaul dengan spatula getah hingga sebati. Masukkan ⑥ dan gaul hingga sebati.", "⑧ Panaskan dengan api sederhana dan putar adunan sehingga sebati seperti kek beras.", "⑨ Ayak serbuk koko ke atas kelawar yang telah dibalut dan letakkan doh di atasnya. Taburkan sedikit serbuk koko di atas doh, tutup dengan bungkus plastik, dan ratakan (daifuku mochi). Potong mochi daifuku kepada 5 bahagian yang sama dan letakkan di atas loyang yang ditaburi serbuk koko. Taburkan dengan serbuk koko, letakkan kertas kertas di antara kedua-duanya, dan gulung dengan pin penggelek pada diameter kira-kira 15cm.", "⑩Tuangkan 1/5 daripada jeli kopi yang ditumbuk kasar ke dalam mangkuk, sapukan beras koji kassata susu di atasnya, dan picit krim putar di sekeliling kassata.", "⑪Tutup mochi Daifuku yang telah digulung menjadi ais krim bulat, bentukkannya dan letakkan di atas kassata. Hiaskan daifuku dengan potongan strawberi dan picit krim putar ke atas daifuku."], "ko": ["시모시라에 스위트 초콜릿, 믹스 너트는 거칠게 새긴다. 그릇에 말린 과일 믹스, 럼주를 넣고 하룻밤 붙여 둔다. 크림치즈는 상온으로 되돌려 둔다.", "①【쌀방 우유의 카사타】쌀방 우유와 크림치즈를 고무 베라로 섞는다.", "②【휘핑크림】 다른 그릇에 생크림, 그라뉴 설탕(4g)을 넣고 7분 세워( 들어올리면 줄무늬가 남는 정도의 부드러움)까지 핸드믹서로 거품낸다.", "③【멜랑게】 다른 그릇에 달걀 흰자를 넣고 절반 정도의 액체가 거품이 될 때까지 핸드믹서로 거품낸다. 그라뉴 설탕(20g)을 3회로 나누어 넣고 들어올리면 모서리가 두드릴 정도까지 매번 섞는다.", "④①에 휘핑크림을 넣고 섞고 머랭을 넣고 섞는다.", "⑤④에 새긴 믹스 너트, 스위트 초콜릿, 드라이 과일 믹스를 더해 섞는다. 랩을 깔은 박쥐에 넣고 위에서 랩을 씌워 냉동고에서 밤새 식힌다.", "⑥【초코 다이후쿠】 경단 가루, 그라뉴 설탕, 코코아 파우더를 합쳐 체로 체다.", "⑦ 냄비에 흰 옥가루, 물을 넣어 발라준다. 물 볶음, 쌀 밀크를 넣고 익숙해 질 때까지 고무 벨라로 섞는다. ⑥를 더하여 더 익숙해질 때까지 섞는다.", "⑧중불로 뜨겁고 굴러가면서 떡처럼 모여 올 때까지 익숙해지면서 불을 넣는다.", "⑨ 랩을 한 배트에 코코아 파우더를 체, 반죽을 얹는다. 직물 위에서 코코아 파우더를 조금 닦아 랩을 걸고 평평하게 한다(오후쿠 떡). 5등분으로 나눈 오후쿠 떡을 코코아 파우더를 흔든 쿠킹 시트 위에 얹는다. 또한 코코아 파우더를 척하고 쿠킹 시트를 얹어 끼워 면봉으로 직경 15cm 정도까지 늘린다.", "⑩ 그릇에 거칠게 부서진 커피 젤리를 1/5량씩 넣고 그 위에 쌀 밀크의 카사타를 깔고 카사타 주위에 휘핑크림을 짜낸다.", "⑪ 둥글게 뽑은 아이스에 뻗은 오후쿠 떡을 씌워 성형하고, 카사타 위에 올려 놓는다. 자른 딸기를 오후쿠 주위에 장식하고 오후쿠 위에 휘핑 크림을 짜면 완성."]}}, {"id": "638c1dd1", "source_url": "https://www.marukome.co.jp/recipe/detail/koji_1577/", "source_site": "Marukome", "image": "https://images.weserv.nl/?url=https://www.marukome.co.jp/img/common/parts/icon_sns_06.png&w=600&output=jpg", "title": {"en": "Baked sweet potato cocoa smoothie", "zh_tw": "烤地瓜可可冰沙", "zh_cn": "烤红薯可可冰沙", "vi": "Sinh tố cacao khoai lang nướng", "hi": "बेक्ड शकरकंद कोको स्मूदी", "ru": "Смузи из запеченного сладкого картофеля с какао", "th": "สมูทตี้โกโก้มันเทศอบ", "id": "Smoothie coklat ubi panggang", "ms": "Smoothie koko ubi bakar", "ko": "구운 고구마 코코아 스무디"}, "title_ja": "焼き芋ココアスムージー", "desc": {"en": "NewsWe provide information on topics related to news releases and campaigns. Release list" d go around it, cover it with a plate, turn it over, and shake it up and down to remove it. Top with strawberries and kiwi."], "zh_tw": ["準備 將草莓切去蒂，縱向切成兩半，切成約2毫米寬的均勻薄片，橫截面朝下。將獼猴桃去皮，縱向切成兩半，一面朝下，切成寬約2毫米的均勻薄片。將它們一一排列，每一個稍微偏移，然後從末端捲起，形成花朵形狀。總共製作 4 個草莓和 2 個獼猴桃。", "①【格蘭諾拉麥片麵團】將格蘭諾拉麥片放入塑膠袋中，用擀麵杖壓成小塊，加入融化的奶油，攪拌均勻。", "② 將優格、「Plus Koji Koji Amazake no Moto」和檸檬汁放入碗中並混合。", "③將水和吉利丁粉倒入耐熱容器中，軟化，不包皮，用600W微波爐加熱20秒至溶解，然後加入②中，混勻。在一碗冰水中冷卻並混合直至變稠。", "④用水潤濕容器內部，將③均勻倒入其中。將格蘭諾拉麥片麵糊均勻地舖在上面，然後放入冰箱冷藏 2 至 3 小時使其變硬。", "⑤ 將小刀或類似物體插入模具邊緣繞一圈，蓋上盤子，翻轉過來，上下搖晃即可取出。上面放上草莓和獼猴桃。"], "zh_cn": ["准备工作 将草莓切去蒂，纵向切成两半，切成约2毫米宽的均匀薄片，横截面朝下。将猕猴桃去皮，纵向切成两半，一面朝下，切成宽约2毫米的均匀薄片。将它们一一排列，每一个稍微偏移，然后从末端卷起，形成花朵形状。总共制作 4 个草莓和 2 个猕猴桃。", "①【格兰诺拉麦片面团】将格兰诺拉麦片放入塑料袋中，用擀面杖压成小块，加入融化的黄油，搅拌均匀。", "② 将酸奶、“Plus Koji Koji Amazake no Moto”和柠檬汁放入碗中并混合。", "③将水和吉利丁粉倒入耐热容器中，软化，不包皮，用600W微波炉加热20秒至溶解，然后加入②中，混匀。在一碗冰水中冷却并混合直至变稠。", "④用水润湿容器内部，将③均匀地倒入其中。将格兰诺拉麦片面糊均匀地铺在上面，然后放入冰箱冷藏 2 至 3 小时使其变硬。", "⑤ 将小刀或类似物体插入模具边缘绕一圈，盖上盘子，翻转过来，上下摇动即可取出。上面放上草莓和猕猴桃。"], "vi": ["Chuẩn bị Cắt bỏ cuống dâu tây, cắt làm đôi theo chiều dọc và cắt thành những lát mỏng đều, rộng khoảng 2 mm, mặt cắt hướng xuống dưới. Gọt vỏ kiwi, cắt làm đôi theo chiều dọc, cắt úp xuống và cắt thành những lát mỏng đều, rộng khoảng 2 mm. Sắp xếp từng cái một, hơi lệch nhau một chút và cuộn chúng lại từ đầu để tạo thành hình bông hoa. Làm tổng cộng 4 quả dâu tây và 2 quả kiwi.", "① [Bột granola] Cho granola vào túi nhựa, dùng cán cán nghiền thành từng miếng nhỏ, thêm bơ tan chảy vào và trộn đều.", "② Cho sữa chua, ``Plus Koji Koji Amazake no Moto'' và nước cốt chanh vào tô và trộn đều.", "③ Đổ nước và gelatin dạng bột vào hộp chịu nhiệt, làm mềm, đun nóng trong lò vi sóng 600W trong 20 giây không cần bọc cho tan, sau đó cho vào ② và trộn đều. Làm lạnh trong một bát nước đá và trộn cho đến khi đặc lại.", "④Làm ướt bên trong thùng chứa bằng nước và đổ đều ③ vào đó. Trải đều bột granola lên trên và để trong tủ lạnh từ 2 đến 3 giờ cho bột cứng lại.", "⑤ Chèn một con dao hoặc vật tương tự vào mép khuôn và đi xung quanh nó, đậy nó bằng một cái đĩa, lật lại và lắc lên xuống để lấy nó ra. Phủ dâu tây và kiwi lên trên."], "hi": ["तैयारी स्ट्रॉबेरी के डंठल काट लें, उन्हें लंबाई में आधा काट लें, और उन्हें लगभग 2 मिमी चौड़े समान रूप से पतले स्लाइस में काट लें, जिसमें क्रॉस सेक्शन नीचे की ओर हो। कीवी को छीलें, लंबाई में आधा काटें, नीचे की तरफ काटें और लगभग 2 मिमी चौड़े समान पतले स्लाइस में काटें। उन्हें एक-एक करके व्यवस्थित करें, हर एक को थोड़ा सा ऑफसेट करें, और फूल का आकार बनाने के लिए उन्हें अंत से ऊपर रोल करें। कुल मिलाकर 4 स्ट्रॉबेरी और 2 कीवी बना लें।", "①[ग्रेनोला आटा] ग्रेनोला को प्लास्टिक बैग में रखें, बेलन से छोटे-छोटे टुकड़ों में कुचल लें, पिघला हुआ मक्खन डालें और मिलाएँ।", "② एक कटोरे में दही, ``प्लस कोजी कोजी अमेज़के नो मोटो'' और नींबू का रस डालें और मिलाएँ।", "③एक गर्मी प्रतिरोधी कंटेनर में पानी और पाउडर जिलेटिन डालें, नरम करें, घुलने के लिए लपेटे बिना 20 सेकंड के लिए 600W माइक्रोवेव में गर्म करें, फिर ② में डालें और मिलाएं। बर्फ के पानी की एक कटोरी में ठंडा करें और गाढ़ा होने तक मिलाएँ।", "④कंटेनर के अंदरूनी हिस्से को पानी से गीला करें और ③उसमें समान रूप से डालें। ग्रेनोला बैटर को ऊपर समान रूप से फैलाएं और सख्त होने के लिए 2 से 3 घंटे के लिए रेफ्रिजरेटर में ठंडा करें।", "⑤ सांचे के किनारे में एक चाकू या इसी तरह की वस्तु डालें और उसके चारों ओर घूमें, इसे एक प्लेट से ढक दें, इसे पलट दें, और इसे हटाने के लिए इसे ऊपर और नीचे हिलाएं। ऊपर से स्ट्रॉबेरी और कीवी डालें।"], "ru": ["Приготовление Отрежьте у клубники плодоножки, разрежьте ее вдоль пополам и нарежьте ровными тонкими ломтиками шириной около 2 мм срезом вниз. Киви очистите, разрежьте вдоль пополам срезом вниз и нарежьте ровными тонкими ломтиками шириной около 2 мм. Разложите их один за другим, слегка смещая каждый, и сверните с конца, чтобы сформировать форму цветка. Всего сделайте 4 клубники и 2 киви.", "① [Тесто для гранолы] Положите гранолу в полиэтиленовый пакет, раздавите скалкой на мелкие кусочки, добавьте растопленное сливочное масло и перемешайте.", "② Добавьте в миску йогурт «Plus Koji Koji Amazake no Moto» и лимонный сок и перемешайте.", "③Налейте воду и порошкообразный желатин в термостойкий контейнер, размягчите, нагрейте в микроволновой печи мощностью 600 Вт в течение 20 секунд, не наворачивая, чтобы он растворился, затем добавьте в ② и перемешайте. Охладите в миске с ледяной водой и перемешайте до загустения.", "④Намочите внутреннюю часть контейнера водой и равномерно вылейте в него ③. Сверху равномерно распределите тесто для гранолы и поставьте в холодильник на 2–3 часа, чтобы оно затвердело.", "⑤ Вставьте нож или подобный предмет в край формы и обойдите его, накройте тарелкой, переверните и встряхните вверх и вниз, чтобы удалить. Сверху выложите клубнику и киви."], "th": ["การเตรียม ตัดก้านออกจากสตรอเบอร์รี่ ผ่าครึ่งตามยาว แล้วหั่นเป็นชิ้นบางเท่าๆ กัน กว้างประมาณ 2 มม. โดยคว่ำหน้าตัดลง ปอกกีวี ผ่าครึ่งตามยาว ผ่าด้านลง แล้วหั่นเป็นชิ้นบางเท่าๆ กัน กว้างประมาณ 2 มม. จัดเรียงทีละอัน โดยชดเชยแต่ละอันเล็กน้อย แล้วม้วนขึ้นจากปลายให้เป็นรูปทรงดอกไม้ ทำสตรอเบอร์รี่ 4 ลูกและกีวี 2 ลูก", "1. [แป้งกราโนล่า] ใส่กราโนล่าลงในถุงพลาสติก บดเป็นชิ้นเล็กๆ ด้วยไม้นวดแป้ง ใส่เนยละลายแล้วผสมให้เข้ากัน", "2) ใส่โยเกิร์ต ``Plus Koji Koji Amazake no Moto'' และน้ำมะนาวลงในชามและผสม", "3.เทน้ำและเจลาตินผงลงในภาชนะทนความร้อน ปล่อยให้นิ่ม นำไปให้ความร้อนในไมโครเวฟ 600W เป็นเวลา 20 วินาทีโดยไม่ต้องห่อให้ละลาย จากนั้นเติมลงใน 2 และผสมให้เข้ากัน แช่เย็นในชามน้ำแข็งแล้วผสมจนข้น", "④ทำให้ด้านในของภาชนะเปียกด้วยน้ำแล้วเท ⑥ ลงไปให้เท่าๆ กัน กระจายแป้งกราโนล่าให้ทั่วและแช่เย็นในตู้เย็นประมาณ 2 ถึง 3 ชั่วโมงเพื่อให้แข็งตัว", "⑤ สอดมีดหรือวัตถุที่คล้ายกันเข้าไปในขอบของแม่พิมพ์แล้วเดินไปรอบๆ คลุมด้วยจาน พลิกกลับ และเขย่าขึ้นลงเพื่อนำออก โรยหน้าด้วยสตรอเบอร์รี่และกีวี"], "id": ["Persiapan Potong batang stroberi, potong menjadi dua memanjang, lalu potong menjadi irisan tipis merata dengan lebar sekitar 2 mm, dengan bagian melintang menghadap ke bawah. Kupas kiwi, potong menjadi dua memanjang, potong menghadap ke bawah, dan potong menjadi irisan tipis merata dengan lebar sekitar 2 mm. Susun satu per satu, imbangi sedikit masing-masing, dan gulung dari ujung hingga membentuk bentuk bunga. Buat total 4 stroberi dan 2 kiwi.", "① [Adonan granola] Masukkan granola ke dalam kantong plastik, hancurkan kecil-kecil dengan rolling pin, tambahkan mentega cair dan aduk.", "② Tambahkan yogurt, ``Plus Koji Koji Amazake no Moto'' dan jus lemon ke dalam mangkuk dan aduk.", "③Tuang air dan agar-agar bubuk ke dalam wadah tahan panas, lunakkan, panaskan dalam microwave 600W selama 20 detik tanpa dibungkus hingga larut, lalu tambahkan ke ② dan aduk. Dinginkan dalam semangkuk air es dan aduk hingga mengental.", "④Basahi bagian dalam wadah dengan air dan tuangkan ③ ke dalamnya secara merata. Oleskan adonan granola secara merata di atasnya dan dinginkan di lemari es selama 2 hingga 3 jam hingga mengeras.", "⑤ Masukkan pisau atau benda serupa ke tepi cetakan dan putar, tutup dengan piring, balikkan, dan kocok ke atas dan ke bawah untuk mengeluarkannya. Taburi dengan stroberi dan kiwi."], "ms": ["Penyediaan Potong batang dari strawberi, potong separuh memanjang, dan potong menjadi kepingan nipis sama rata kira-kira 2 mm lebar, dengan bahagian silang menghadap ke bawah. Kupas kiwi, potong separuh memanjang, potong ke bawah, dan potong menjadi kepingan nipis sama rata kira-kira 2 mm lebar. Susun satu demi satu, sedikit mengimbangi setiap satu, dan gulungkannya dari hujung untuk membentuk bentuk bunga. Jadikan sejumlah 4 buah strawberi dan 2 buah kiwi.", "① [Dough Granola] Masukkan granola ke dalam beg plastik, hancurkan menjadi kepingan kecil dengan pin canai, masukkan mentega cair dan gaul.", "② Masukkan yogurt, ``Plus Koji Koji Amazake no Moto'' dan jus lemon ke dalam mangkuk dan gaul.", "③Tuang air dan serbuk gelatin ke dalam bekas tahan panas, lembutkan, panaskan dalam ketuhar gelombang mikro 600W selama 20 saat tanpa membungkus untuk larut, kemudian tambah kepada ② dan gaul. Sejukkan dalam mangkuk berisi air batu dan gaul hingga pekat.", "④Basahkan bahagian dalam bekas dengan air dan tuangkan ③ ke dalamnya secara merata. Ratakan adunan granola di atasnya dan sejukkan di dalam peti sejuk selama 2 hingga 3 jam untuk mengeras.", "⑤ Masukkan pisau atau objek serupa ke dalam tepi acuan dan kelilinginya, tutup dengan pinggan, terbalikkan dan goncangkannya ke atas dan ke bawah untuk mengeluarkannya. Teratas dengan strawberi dan kiwi."], "ko": ["밑고시라에 딸기는 헤타를 잘라 세로로 반으로 자르고, 단면을 아래로 하고, 폭 2mm 정도로 균등하게 얇게 자른다. 키위는 껍질을 벗기고 세로로 반으로 자르고, 단면을 아래로 하고, 폭 2mm 정도로 균등하게 얇게 자른다. 각각 조금씩 어긋나게 늘어놓고, 끝에서 빙글빙글 감아 꽃 모양으로 한다. 딸기는 총 4개, 키위는 총 2개 만든다.", "①【그라놀라 천】비닐봉투에 그라놀라를 넣어 면봉으로 세세하게 부수고, 녹여 버터를 더해 쏟는다.", "② 그릇에 요구르트, '플러스 봉 甘甘酒의 소', 레몬즙을 넣고 섞는다.", "③ 내열용기에 물, 가루 젤라틴을 넣어 부드럽게 하고, 랩은 하지 않고 600W의 레인지로 20초 가열하여 녹여 ②에 더해 섞는다. 얼음물이 들어간 그릇으로 식히면서 녹슬지 않을 때까지 섞는다.", "④ 용기 안쪽을 물로 적시고 ③을 등분으로 흘려 넣는다. 그라놀라 원단을 등분에 얹어 냉장고에서 2~3시간 식혀 굳힌다.", "⑤형의 가장자리에 나이프 등을 넣고 빙글빙글 돌고 접시를 씌워 뒤집어 상하로 꺼낸다. 딸기, 키위를 얹는다."]}}, {"id": "8b10798e", "source_url": "https://www.marukome.co.jp/global/en/recipe/miso_016/", "source_site": "Marukome", "image": "https://images.weserv.nl/?url=https://www.marukome.co.jp/global/en/wp-global/wp-content/uploads/2021/08/ekimiso_001n.jpg&w=600&output=jpg", "title": {"en": "Korean Miso Tofu Jjigae Stew", "zh_tw": "韓國味噌豆腐燉菜", "zh_cn": "韩国味噌豆腐炖菜", "vi": "Đậu hũ Miso Hàn Quốc Jjigae hầm", "hi": "कोरियाई मिसो टोफू जजिगे स्टू", "ru": "Корейское рагу мисо с тофу чджигэ", "th": "มิโซะเต้าหู้จิเกสตูว์เกาหลี", "id": "Rebusan Jjigae Tahu Miso Korea", "ms": "Rebus Tauhu Jjigae Miso Korea", "ko": "Korean Miso Tofu Jjigae Stew"}, "title_ja": "Korean Miso Tofu Jjigae Stew", "desc": {"en": "", "zh_tw": "", "zh_cn": "", "vi": "", "hi": "", "ru": "", "th": "", "id": "", "ms": "", "ko": ""}, "desc_ja": "", "ingredients": [{"name_ja": "Tofu", "amount": "300g", "translated": {"en": "Tofu", "zh_tw": "豆腐", "zh_cn": "豆腐", "vi": "Đậu phụ", "hi": "टोफू", "ru": "Тофу", "th": "เต้าหู้", "id": "Tahu", "ms": "tauhu", "ko": "Tofu"}, "amazon": "https://www.amazon.co.jp/s?k=Tofu&tag=", "rakut const PER_PAGE = 10;
let currentLang = 'en';
let currentPage = 1;
let filtered = RECIPES;

// ── 言語切替 ──
function setLang(lang) {
  currentLang = lang;
  document.querySelector('.lang-select').value = lang;
  document.getElementById('search-input').placeholder = (SEC[lang]||SEC['en']).search_placeholder;
  document.querySelector('.back-btn').textContent = (SEC[lang]||SEC['en']).back;
  renderList();
}

// ── 検索 ──
function onSearch() {
  const q = document.getElementById('search-input').value.toLowerCase();
  filtered = q ? RECIPES.filter(r => {
    const t = (r.title[currentLang]||r.title_ja||'').toLowerCase();
    return t.includes(q);
  }) : RECIPES;
  currentPage = 1;
  renderList();
}

// ── 一覧表示 ──
function showList() {
  document.getElementById('list-view').style.display = 'block';
  document.getElementById('detail-view').style.display = 'none';
  renderList();
}

function renderList() {
  const grid = document.getElementById('recipe-grid');
  const total = filtered.length;
  const pages = Math.ceil(total / PER_PAGE);
  const start = (currentPage - 1) * PER_PAGE;
  const slice = filtered.slice(start, start + PER_PAGE);

  grid.innerHTML = slice.map(r => {
    const title = r.title[currentLang] || r.title_ja;
    const imgHtml = r.image
      ? `<img src="${r.image}" alt="${title}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=no-img>🍽️</div>'">`
      : `<div class="no-img">🍽️</div>`;
    return `<div class="recipe-thumb" onclick="showDetail('${r.id}')">
      ${imgHtml}
      <div class="thumb-body">
        <div class="thumb-title">${title}</div>
        <div class="thumb-site">${r.source_site}</div>
      </div>
    </div>`;
  }).join('');

  // ページネーション
  const pag = document.getElementById('pagination');
  if (pages <= 1) { pag.innerHTML = ''; return; }
  const s = SEC[currentLang]||SEC['en'];
  pag.innerHTML = Array.from({length: pages}, (_, i) =>
    `<button class="page-btn${i+1===currentPage?' active':''}" onclick="goPage(${i+1})">${s.page} ${i+1}</button>`
  ).join('');
}

function goPage(p) {
  currentPage = p;
  renderList();
  window.scrollTo(0,0);
}

// ── 詳細表示 ──
function showDetail(id) {
  const r = RECIPES.find(x => x.id === id);
  if (!r) return;
  const lang = currentLang;
  const s = SEC[lang]||SEC['en'];

  // 画像
  const img = document.getElementById('d-img');
  if (r.image) { img.src = r.image; img.alt = r.title[lang]||r.title_ja; img.style.display='block'; }
  else img.style.display = 'none';

  // タイトル・説明
  document.getElementById('d-title').textContent = r.title[lang]||r.title_ja;
  document.getElementById('d-desc').textContent  = r.desc[lang]||r.desc_ja||'';

  // 出典リンク
  const srcEl = document.getElementById('d-source');
  srcEl.textContent = `${s.source}: ${r.source_site}`;
  srcEl.href = r.source_url;

  // セクション見出し
  document.getElementById('d-sec-ing').textContent   = s.ingredients;
  document.getElementById('d-sec-steps').textContent = s.steps;
  document.getElementById('d-aff-ttl').textContent   = s.buy;
  document.querySelector('.back-btn').textContent    = s.back;

  // 材料
  const ingGrid = document.getElementById('d-ing-grid');
  ingGrid.innerHTML = r.ingredients.map(ing => {
    const name = (ing.translated&&ing.translated[lang]) || ing.name_ja;
    const aff = [
      ing.amazon  ? `<a class="aff-link amz" href="${ing.amazon}"  target="_blank" rel="nofollow">Amazon</a>` : '',
      ing.rakuten ? `<a class="aff-link rkt" href="${ing.rakuten}" target="_blank" rel="nofollow">楽天</a>`   : '',
    ].join('');
    return `<div class="ing">
      <span class="amt">${ing.amount}</span>
      <span>${name}</span>
      ${aff ? `<div class="aff-row">${aff}</div>` : ''}
    </div>`;
  }).join('');

  // 手順
  const stepsList = r.steps[lang] || r.steps['en'] || [];
  document.getElementById('d-steps-list').innerHTML = stepsList.map(s => `<li>${s}</li>`).join('');

  document.getElementById('list-view').style.display   = 'none';
  document.getElementById('detail-view').style.display = 'block';
  window.scrollTo(0,0);
}

(function() {
  const c = (navigator.language||'').toLowerCase().slice(0,2);
  const map = {'zh':'zh_cn','vi':'vi','hi':'hi','ru':'ru','th':'th','id':'id','ms':'ms','ko':'ko'};
  if (map[c]) { currentLang = map[c]; document.querySelector('.lang-select').value = map[c]; }
